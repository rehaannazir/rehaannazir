<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320" fill="none" role="img" aria-label="Rehan Nazir — AI Production Systems Engineer">
  <defs>
    <linearGradient id="name" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F2F2F6"/>
      <stop offset="0.6" stop-color="#D8C2F5"/>
      <stop offset="1" stop-color="#A855F7"/>
      <animate attributeName="x1" values="0;-0.4;0" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1;1.4;1" dur="9s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A855F7" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#A855F7" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7C3AED" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="type"><rect x="118" y="230" width="0" height="24"><animate attributeName="width" values="0;0;424;424;0" keyTimes="0;0.06;0.46;0.86;1" dur="7.5s" repeatCount="indefinite"/></rect></clipPath>
    <style>
      .name{font:800 58px 'Segoe UI',Helvetica,Arial,sans-serif;letter-spacing:3px}
      .role{font:600 18px 'Segoe UI',Helvetica,Arial,sans-serif;fill:#B8B4C4;letter-spacing:7px}
      .meta{font:600 12px ui-monospace,Consolas,monospace;fill:#8A8698;letter-spacing:1px}
      .tag{font:500 16px ui-monospace,Consolas,monospace;fill:#C9A9F5}
      .dim{fill:#4A4458}
      @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
      .cursor{animation:blink 1.05s step-end infinite}
      @keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
      .f1{animation:fl 7s ease-in-out infinite}
      @keyframes sig{to{stroke-dashoffset:-40}}
      .sig{stroke-dasharray:3 7;animation:sig 1.6s linear infinite}
    </style>
  </defs>

  <rect x="1" y="1" width="898" height="318" rx="20" fill="#000000" stroke="#17141C"/>
  <circle cx="120" cy="80" r="200" fill="url(#glow)"/>

  <!-- faint circuit traces, top-right corner -->
  <g stroke="#2A2233" stroke-width="1" opacity="0.9">
    <path d="M900 40 H770 V90 H700"/>
    <path d="M900 120 H820 V70"/>
    <path d="M760 20 V70 H700"/>
  </g>
  <g class="sig" stroke="#A855F7" stroke-width="1.2" opacity="0.8">
    <path d="M900 40 H770 V90 H700"/>
    <path d="M760 20 V70 H700"/>
  </g>
  <g fill="#A855F7"><circle cx="700" cy="90" r="2.5"/><circle cx="700" cy="70" r="2.5"/><circle cx="820" cy="120" r="2.5"/></g>

  <!-- mini wired-node cluster (right) -->
  <g class="f1" transform="translate(690,150)" stroke="#3A2E48" stroke-width="1">
    <line x1="40" y1="20" x2="90" y2="0"/><line x1="40" y1="20" x2="95" y2="55"/>
    <line x1="90" y1="0" x2="150" y2="30"/><line x1="95" y1="55" x2="150" y2="30"/>
    <line x1="40" y1="20" x2="30" y2="80"/><line x1="30" y1="80" x2="95" y2="55"/>
    <line x1="150" y1="30" x2="140" y2="90"/><line x1="95" y1="55" x2="140" y2="90"/>
  </g>
  <g class="f1" transform="translate(690,150)" fill="#050507" stroke="#A855F7" stroke-width="1.4">
    <circle cx="40" cy="20" r="4"><animate attributeName="r" values="4;6;4" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="90" cy="0" r="3"/><circle cx="150" cy="30" r="4"><animate attributeName="r" values="4;6;4" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="95" cy="55" r="5"><animate attributeName="r" values="5;7;5" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="30" cy="80" r="3"/><circle cx="140" cy="90" r="3"/>
  </g>

  <rect x="40" y="58" width="360" height="2" rx="1" fill="url(#acc)"><animate attributeName="width" values="0;360" dur="1.4s" fill="freeze"/></rect>

  <text x="40" y="128" class="name" fill="url(#name)">REHAN NAZIR</text>
  <text x="42" y="162" class="role">AI PRODUCTION SYSTEMS ENGINEER</text>

  <!-- student + company line -->
  <circle cx="46" cy="188" r="3" fill="#A855F7"/>
  <text x="58" y="192" class="meta">3rd-YEAR DATA SCIENCE STUDENT</text>
  <circle cx="330" cy="188" r="3" fill="#A855F7"/>
  <text x="342" y="192" class="meta">FOUNDER @ NYVEXA</text>

  <!-- typewriter tagline -->
  <text x="42" y="248" class="tag dim">&gt;</text>
  <g clip-path="url(#type)"><text x="118" y="248" class="tag">building autonomous AI systems in production</text></g>
  <rect class="cursor" x="118" y="232" width="9" height="18" fill="#A855F7"><animate attributeName="x" values="118;118;542;542;118" keyTimes="0;0.06;0.46;0.86;1" dur="7.5s" repeatCount="indefinite"/></rect>

  <!-- minimal chips -->
  <g transform="translate(42,272)">
    <g><rect width="118" height="28" rx="6" fill="#080609" stroke="#241D2E"/><circle cx="16" cy="14" r="3" fill="#A855F7"/><text x="28" y="18" class="meta">AI Agents</text></g>
    <g transform="translate(130,0)"><rect width="118" height="28" rx="6" fill="#080609" stroke="#241D2E"/><circle cx="16" cy="14" r="3" fill="#A855F7"/><text x="28" y="18" class="meta">LangGraph</text></g>
    <g transform="translate(260,0)"><rect width="80" height="28" rx="6" fill="#080609" stroke="#241D2E"/><circle cx="16" cy="14" r="3" fill="#A855F7"/><text x="28" y="18" class="meta">RAG</text></g>
    <g transform="translate(350,0)"><rect width="118" height="28" rx="6" fill="#080609" stroke="#241D2E"/><circle cx="16" cy="14" r="3" fill="#A855F7"/><text x="28" y="18" class="meta">FastAPI</text></g>
  </g>
</svg>
