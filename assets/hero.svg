<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300" fill="none" role="img" aria-label="Rehan Nazir — AI Production Systems Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0A0F"/>
      <stop offset="1" stop-color="#0D0D14"/>
    </linearGradient>
    <linearGradient id="name" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5B8CFF"/>
      <stop offset="0.5" stop-color="#B96BFF"/>
      <stop offset="1" stop-color="#22D3EE"/>
      <animate attributeName="x1" values="0;-1;0" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1;2;1" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5B8CFF" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#B96BFF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#5B8CFF" stop-opacity="0.0"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4D7CFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#4D7CFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPurple" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#A855F7" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="type"><rect x="118" y="196" width="0" height="26"><animate attributeName="width" values="0;0;372;372;0" keyTimes="0;0.05;0.45;0.85;1" dur="7s" repeatCount="indefinite"/></rect></clipPath>
    <style>
      .name{font:800 60px 'Segoe UI',Helvetica,Arial,sans-serif;letter-spacing:2px}
      .role{font:600 20px 'Segoe UI',Helvetica,Arial,sans-serif;fill:#C8C8DA;letter-spacing:6px}
      .tag{font:500 17px ui-monospace,'Cascadia Code',Consolas,monospace;fill:#8FB4FF}
      .chip{font:600 12px 'Segoe UI',Helvetica,Arial,sans-serif;fill:#C8C8DA;letter-spacing:1px}
      .dim{fill:#5A5A72}
      @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
      .cursor{animation:blink 1s step-end infinite}
      @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
      .f1{animation:floaty 6s ease-in-out infinite}
      .f2{animation:floaty 7.5s ease-in-out infinite}
      .f3{animation:floaty 9s ease-in-out infinite}
    </style>
  </defs>

  <rect x="1.5" y="1.5" width="897" height="297" rx="20" fill="url(#bg)" stroke="#1C1C28"/>

  <!-- moving glows -->
  <g class="f1"><circle cx="130" cy="90" r="150" fill="url(#glowBlue)"/></g>
  <g class="f2"><circle cx="780" cy="230" r="160" fill="url(#glowPurple)"/></g>

  <!-- faint grid -->
  <g stroke="#FFFFFF" stroke-opacity="0.03">
    <path d="M0 60 H900 M0 120 H900 M0 180 H900 M0 240 H900"/>
    <path d="M150 0 V300 M300 0 V300 M450 0 V300 M600 0 V300 M750 0 V300"/>
  </g>

  <!-- floating nodes -->
  <g fill="#5B8CFF">
    <circle class="f3" cx="820" cy="70" r="3" opacity="0.8"/>
    <circle class="f2" cx="70" cy="230" r="2.5" opacity="0.7"/>
    <circle class="f1" cx="860" cy="150" r="2" opacity="0.6"/>
  </g>

  <!-- animated top accent line -->
  <rect x="40" y="52" width="380" height="2" rx="1" fill="url(#stroke)">
    <animate attributeName="width" values="0;380" dur="1.4s" fill="freeze"/>
  </rect>

  <text x="40" y="130" class="name" fill="url(#name)">REHAN NAZIR</text>
  <text x="42" y="165" class="role">AI PRODUCTION SYSTEMS ENGINEER</text>

  <!-- typewriter tagline -->
  <text x="42" y="215" class="tag dim">&gt;</text>
  <g clip-path="url(#type)"><text x="118" y="215" class="tag">deploying autonomous agents to production</text></g>
  <rect class="cursor" x="118" y="199" width="10" height="18" fill="#8FB4FF"><animate attributeName="x" values="118;118;490;490;118" keyTimes="0;0.05;0.45;0.85;1" dur="7s" repeatCount="indefinite"/></rect>

  <!-- focus chips -->
  <g class="f3">
    <g transform="translate(560,110)">
      <rect width="128" height="30" rx="15" fill="#12121A" stroke="#2A2A3A"/>
      <circle cx="18" cy="15" r="4" fill="#5B8CFF"/><text x="32" y="19" class="chip">AI Agents</text>
    </g>
    <g transform="translate(700,110)">
      <rect width="150" height="30" rx="15" fill="#12121A" stroke="#2A2A3A"/>
      <circle cx="18" cy="15" r="4" fill="#B96BFF"/><text x="32" y="19" class="chip">LangGraph</text>
    </g>
    <g transform="translate(560,150)">
      <rect width="110" height="30" rx="15" fill="#12121A" stroke="#2A2A3A"/>
      <circle cx="18" cy="15" r="4" fill="#22D3EE"/><text x="32" y="19" class="chip">RAG</text>
    </g>
    <g transform="translate(682,150)">
      <rect width="168" height="30" rx="15" fill="#12121A" stroke="#2A2A3A"/>
      <circle cx="18" cy="15" r="4" fill="#5B8CFF"/><text x="32" y="19" class="chip">FastAPI · Python</text>
    </g>
  </g>
</svg>
