<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300" fill="none" role="img" aria-label="Current roadmap">
  <defs>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5B8CFF"/><stop offset="1" stop-color="#B96BFF"/>
    </linearGradient>
    <style>
      .t{font:600 15px 'Segoe UI',Helvetica,Arial,sans-serif;fill:#E6E6F0}
      .pct{font:700 13px ui-monospace,Consolas,monospace;fill:#9FB8FF}
    </style>
  </defs>
  <rect x="1" y="1" width="898" height="298" rx="16" fill="#0A0A0F" stroke="#1C1C28"/>

  <!-- AI Agents 85 -->
  <text x="40" y="52" class="t">AI Agents &amp; Agentic Workflows</text>
  <text x="828" y="52" text-anchor="end" class="pct">85%</text>
  <rect x="40" y="62" width="820" height="10" rx="5" fill="#16161F"/>
  <rect x="40" y="62" width="0" height="10" rx="5" fill="url(#bar)"><animate attributeName="width" values="0;697" dur="1.6s" fill="freeze"/></rect>

  <!-- Production Systems 78 -->
  <text x="40" y="102" class="t">Production Systems &amp; APIs</text>
  <text x="828" y="102" text-anchor="end" class="pct">78%</text>
  <rect x="40" y="112" width="820" height="10" rx="5" fill="#16161F"/>
  <rect x="40" y="112" width="0" height="10" rx="5" fill="url(#bar)"><animate attributeName="width" values="0;640" dur="1.6s" begin="0.15s" fill="freeze"/></rect>

  <!-- MLOps 55 -->
  <text x="40" y="152" class="t">MLOps &amp; Deployment</text>
  <text x="828" y="152" text-anchor="end" class="pct">55%</text>
  <rect x="40" y="162" width="820" height="10" rx="5" fill="#16161F"/>
  <rect x="40" y="162" width="0" height="10" rx="5" fill="url(#bar)"><animate attributeName="width" values="0;451" dur="1.6s" begin="0.3s" fill="freeze"/></rect>

  <!-- Cloud 48 -->
  <text x="40" y="202" class="t">Cloud Infrastructure</text>
  <text x="828" y="202" text-anchor="end" class="pct">48%</text>
  <rect x="40" y="212" width="820" height="10" rx="5" fill="#16161F"/>
  <rect x="40" y="212" width="0" height="10" rx="5" fill="url(#bar)"><animate attributeName="width" values="0;394" dur="1.6s" begin="0.45s" fill="freeze"/></rect>

  <!-- Distributed 35 -->
  <text x="40" y="252" class="t">Distributed Systems</text>
  <text x="828" y="252" text-anchor="end" class="pct">35%</text>
  <rect x="40" y="262" width="820" height="10" rx="5" fill="#16161F"/>
  <rect x="40" y="262" width="0" height="10" rx="5" fill="url(#bar)"><animate attributeName="width" values="0;287" dur="1.6s" begin="0.6s" fill="freeze"/></rect>
</svg>
