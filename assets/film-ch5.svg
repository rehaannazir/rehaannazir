<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 800" width="1920" height="800" fill="none" role="img" aria-label="Chapter 5 — Agents: the AI operations center, eight autonomous workers running a company">
  <defs>
    <radialGradient id="vig" cx="0.5" cy="0.5" r="0.72">
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/><stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="fogViolet" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#4C3B7A" stop-opacity="0.07"/><stop offset="1" stop-color="#4C3B7A" stop-opacity="0"/></radialGradient>
    <radialGradient id="fogBlue" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#1C3A6E" stop-opacity="0.05"/><stop offset="1" stop-color="#1C3A6E" stop-opacity="0"/></radialGradient>
    <radialGradient id="orchGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#C4B5FD" stop-opacity="0.75"/><stop offset="0.45" stop-color="#8B5CF6" stop-opacity="0.3"/><stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" result="n"/><feColorMatrix in="n" type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.032"/></feComponentTransfer></filter>
    <filter id="blurMid" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="1.6"/></filter>
    <filter id="blurFg" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7"/></filter>

    <!-- one agent workstation: desk console + robot avatar -->
    <g id="pod">
      <rect x="-75" y="0" width="150" height="60" rx="10" fill="#0A090F" stroke="#262138" stroke-width="1.6"/>
      <rect class="t1" x="-58" y="14" width="70" height="4" rx="2" fill="#3A3450"/>
      <rect class="t2" x="-58" y="27" width="96" height="4" rx="2" fill="#332E48"/>
      <rect class="t3" x="-58" y="40" width="54" height="4" rx="2" fill="#3A3450"/>
      <rect x="-16" y="-46" width="32" height="26" rx="10" fill="#0C0B12" stroke="#4A4462" stroke-width="1.6"/>
      <rect x="-9" y="-37" width="18" height="6" rx="3" fill="#1A1030"/>
      <circle cx="0" cy="-34" r="2" fill="#CFC6EE"><animate attributeName="cx" values="-6;6;-6" dur="3.4s" repeatCount="indefinite"/></circle>
    </g>

    <style>
      .cap{font:600 21px ui-monospace,Consolas,monospace;fill:#F1EDFB;letter-spacing:5px}
      .slate{font:600 11px ui-monospace,Consolas,monospace;fill:#A29BC0;letter-spacing:4px}
      .aname{font:700 12px ui-monospace,Consolas,monospace;fill:#D5CFE8;letter-spacing:3px}
      .anameB{font:700 10px ui-monospace,Consolas,monospace;fill:#8F87AC;letter-spacing:2px}
      .plbl{font:600 11px ui-monospace,Consolas,monospace;fill:#C9B8F5;letter-spacing:3px}

      @keyframes worldBreathe{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
      .world{transform-origin:960px 400px;animation:worldBreathe 18s ease-in-out infinite}

      /* terminal typing */
      .t1,.t2,.t3{transform-box:fill-box;transform-origin:left center}
      @keyframes type{0%{transform:scaleX(0)}42%,72%{transform:scaleX(1)}78%,100%{transform:scaleX(0)}}
      .t1{animation:type 3.4s steps(14) infinite}
      .t2{animation:type 4.1s steps(18) infinite -1.2s}
      .t3{animation:type 3.7s steps(11) infinite -2.1s}

      /* task queue shrinking */
      @keyframes q2{0%,40%{opacity:1}46%,84%{opacity:0}90%,100%{opacity:1}}
      @keyframes q3{0%,18%{opacity:1}24%,84%{opacity:0}90%,100%{opacity:1}}
      .qd2{animation:q2 7s linear infinite}
      .qd3{animation:q3 7s linear infinite}
      .qa{animation-delay:0s}.qb{animation-delay:-2.3s}.qc{animation-delay:-4.1s}.qe{animation-delay:-5.5s}

      /* collaboration windows */
      @keyframes colA{0%,6%{opacity:0}10%,22%{opacity:1}26%,100%{opacity:0}}
      @keyframes colB{0%,39%{opacity:0}43%,55%{opacity:1}59%,100%{opacity:0}}
      @keyframes colC{0%,72%{opacity:0}76%,88%{opacity:1}92%,100%{opacity:0}}
      .colA{animation:colA 18s linear infinite}
      .colB{animation:colB 18s linear infinite}
      .colC{animation:colC 18s linear infinite}
      @keyframes crawl{to{stroke-dashoffset:-72}}
      .arc{stroke-dasharray:4 8;animation:crawl 1.8s linear infinite}

      @keyframes tw{0%,100%{opacity:0.14}50%{opacity:0.6}}
      .tw1{animation:tw 3.6s ease-in-out infinite}
      .tw2{animation:tw 4.9s ease-in-out infinite 1.1s}
      .tw3{animation:tw 6.1s ease-in-out infinite 2.3s}
      @keyframes fogDrift{0%,100%{transform:translate(0,0)}50%{transform:translate(56px,-24px)}}
      .fogDrift{animation:fogDrift 24s ease-in-out infinite}
      @keyframes fogDrift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-60px,26px)}}
      .fogDrift2{animation:fogDrift2 28s ease-in-out infinite}
      @keyframes fgSweep{0%{transform:translate(-420px,-260px);opacity:0}18%{opacity:0.16}55%{opacity:0.16}100%{transform:translate(760px,470px);opacity:0}}
      .fgSweep{animation:fgSweep 9.5s cubic-bezier(0.3,0.1,0.6,0.9) infinite}

      @keyframes cap{0%,20%{opacity:0}27%,58%{opacity:1}66%,100%{opacity:0}}
      .capA{animation:cap 18s linear infinite}
    </style>
  </defs>

  <!-- ============ STAGE ============ -->
  <rect width="1920" height="800" fill="#050505"/>
  <g class="fogDrift"><ellipse cx="960" cy="240" rx="880" ry="360" fill="url(#fogViolet)"/></g>
  <g class="fogDrift2"><ellipse cx="700" cy="620" rx="760" ry="320" fill="url(#fogBlue)"/></g>

  <g class="world">
    <!-- ambient stars -->
    <g fill="#6E67A0">
      <circle class="tw1" cx="140" cy="140" r="1.5"/><circle class="tw2" cx="700" cy="90" r="1.4"/>
      <circle class="tw3" cx="1240" cy="120" r="1.5"/><circle class="tw1" cx="1820" cy="180" r="1.5"/>
      <circle class="tw2" cx="90" cy="640" r="1.4"/><circle class="tw3" cx="1850" cy="620" r="1.4"/>
    </g>

    <!-- ============ THE ORCHESTRATOR ============ -->
    <circle cx="960" cy="110" r="70" fill="url(#orchGlow)"/>
    <circle cx="960" cy="110" r="26" fill="none" stroke="#6D4FCE" stroke-width="1.2" stroke-dasharray="3 7">
      <animateTransform attributeName="transform" type="rotate" from="0 960 110" to="360 960 110" dur="26s" repeatCount="indefinite"/>
    </circle>
    <circle cx="960" cy="110" r="9" fill="#F3EEFF"/>
    <circle cx="960" cy="110" r="10" fill="none" stroke="#C4B5FD"><animate attributeName="r" values="10;30;10" dur="3.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0;0.8" dur="3.2s" repeatCount="indefinite"/></circle>
    <text x="960" y="56" text-anchor="middle" class="plbl">ORCHESTRATOR</text>

    <!-- dispatch lines -->
    <g stroke="#241E33" stroke-width="1.2">
      <path d="M960 120 L330 464"/><path d="M960 120 L730 464"/><path d="M960 120 L1130 464"/><path d="M960 120 L1530 464"/>
      <path d="M960 120 L460 274"/><path d="M960 120 L1660 274"/>
    </g>
    <g fill="#A78BFA">
      <circle r="3"><animateMotion dur="2.2s" begin="0s" repeatCount="indefinite" path="M960 120 L330 464"/><animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.12;0.85;1" dur="2.2s" begin="0s" repeatCount="indefinite"/></circle>
      <circle r="3"><animateMotion dur="2.2s" begin="-0.4s" repeatCount="indefinite" path="M960 120 L730 464"/><animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.12;0.85;1" dur="2.2s" begin="-0.4s" repeatCount="indefinite"/></circle>
      <circle r="3"><animateMotion dur="2.2s" begin="-0.8s" repeatCount="indefinite" path="M960 120 L1130 464"/><animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.12;0.85;1" dur="2.2s" begin="-0.8s" repeatCount="indefinite"/></circle>
      <circle r="3"><animateMotion dur="2.2s" begin="-1.2s" repeatCount="indefinite" path="M960 120 L1530 464"/><animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.12;0.85;1" dur="2.2s" begin="-1.2s" repeatCount="indefinite"/></circle>
      <circle r="3"><animateMotion dur="2.2s" begin="-1.6s" repeatCount="indefinite" path="M960 120 L460 274"/><animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.12;0.85;1" dur="2.2s" begin="-1.6s" repeatCount="indefinite"/></circle>
      <circle r="3"><animateMotion dur="2.2s" begin="-2s" repeatCount="indefinite" path="M960 120 L1660 274"/><animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.12;0.85;1" dur="2.2s" begin="-2s" repeatCount="indefinite"/></circle>
    </g>

    <!-- ============ BACK ROW · depth ============ -->
    <g filter="url(#blurMid)" opacity="0.8">
      <g transform="translate(460,300) scale(0.78)">
        <use href="#pod"/>
        <circle cx="30" cy="-40" r="4"><animate attributeName="fill" values="#60A5FA;#60A5FA;#FB923C;#FB923C;#34D399;#34D399;#60A5FA" keyTimes="0;0.3;0.36;0.68;0.74;0.94;1" dur="6.1s" repeatCount="indefinite"/></circle>
      </g>
      <text x="460" y="378" text-anchor="middle" class="anameB">FINANCE</text>
      <g transform="translate(860,300) scale(0.78)">
        <use href="#pod"/>
        <circle cx="30" cy="-40" r="4"><animate attributeName="fill" values="#60A5FA;#60A5FA;#FB923C;#FB923C;#34D399;#34D399;#60A5FA" keyTimes="0;0.3;0.36;0.68;0.74;0.94;1" dur="7.3s" begin="-2.2s" repeatCount="indefinite"/></circle>
      </g>
      <text x="860" y="378" text-anchor="middle" class="anameB">MARKETING</text>
      <g transform="translate(1260,300) scale(0.78)">
        <use href="#pod"/>
        <circle cx="30" cy="-40" r="4"><animate attributeName="fill" values="#60A5FA;#60A5FA;#FB923C;#FB923C;#34D399;#34D399;#60A5FA" keyTimes="0;0.3;0.36;0.68;0.74;0.94;1" dur="6.7s" begin="-3.8s" repeatCount="indefinite"/></circle>
      </g>
      <text x="1260" y="378" text-anchor="middle" class="anameB">BROWSER</text>
      <g transform="translate(1660,300) scale(0.78)">
        <use href="#pod"/>
        <circle cx="30" cy="-40" r="4"><animate attributeName="fill" values="#60A5FA;#60A5FA;#FB923C;#FB923C;#34D399;#34D399;#60A5FA" keyTimes="0;0.3;0.36;0.68;0.74;0.94;1" dur="7.9s" begin="-5.1s" repeatCount="indefinite"/></circle>
      </g>
      <text x="1660" y="378" text-anchor="middle" class="anameB">DATA</text>
    </g>

    <!-- ============ COLLABORATION · threads appear only when needed ============ -->
    <g class="colA"><path class="arc" d="M330 470 C 560 360 900 360 1130 470" stroke="#4A4462" stroke-width="1.4"/><circle r="3.5" fill="#C4B5FD"><animateMotion dur="2.4s" repeatCount="indefinite" path="M330 470 C 560 360 900 360 1130 470"/></circle></g>
    <g class="colB"><path class="arc" d="M730 470 C 950 380 1310 380 1530 470" stroke="#4A4462" stroke-width="1.4"/><circle r="3.5" fill="#C4B5FD"><animateMotion dur="2.4s" repeatCount="indefinite" path="M730 470 C 950 380 1310 380 1530 470"/></circle></g>
    <g class="colC"><path class="arc" d="M860 340 C 1060 380 1330 420 1530 470" stroke="#4A4462" stroke-width="1.4"/><circle r="3.5" fill="#C4B5FD"><animateMotion dur="2.4s" repeatCount="indefinite" path="M860 340 C 1060 380 1330 420 1530 470"/></circle></g>

    <!-- ============ FRONT ROW · the working floor ============ -->
    <g transform="translate(330,510)">
      <use href="#pod"/>
      <circle r="4.5" fill="#60A5FA"><animateMotion dur="5s" repeatCount="indefinite" path="M26 -33 A 26 18 0 1 1 -26 -33 A 26 18 0 1 1 26 -33"/><animate attributeName="fill" values="#60A5FA;#60A5FA;#FB923C;#FB923C;#34D399;#34D399;#60A5FA" keyTimes="0;0.3;0.36;0.68;0.74;0.94;1" dur="6.3s" repeatCount="indefinite"/></circle>
      <g fill="#6E6890"><circle cx="36" cy="-30" r="2.5"/><circle class="qd2 qa" cx="36" cy="-21" r="2.5"/><circle class="qd3 qa" cx="36" cy="-12" r="2.5"/></g>
    </g>
    <text x="330" y="608" text-anchor="middle" class="aname">CODING</text>

    <g transform="translate(730,510)">
      <use href="#pod"/>
      <circle r="4.5" fill="#60A5FA"><animateMotion dur="5.6s" begin="-1.3s" repeatCount="indefinite" path="M26 -33 A 26 18 0 1 1 -26 -33 A 26 18 0 1 1 26 -33"/><animate attributeName="fill" values="#60A5FA;#60A5FA;#FB923C;#FB923C;#34D399;#34D399;#60A5FA" keyTimes="0;0.3;0.36;0.68;0.74;0.94;1" dur="7.1s" begin="-1.7s" repeatCount="indefinite"/></circle>
      <g fill="#6E6890"><circle cx="36" cy="-30" r="2.5"/><circle class="qd2 qb" cx="36" cy="-21" r="2.5"/><circle class="qd3 qb" cx="36" cy="-12" r="2.5"/></g>
    </g>
    <text x="730" y="608" text-anchor="middle" class="aname">RESEARCH</text>

    <g transform="translate(1130,510)">
      <use href="#pod"/>
      <circle r="4.5" fill="#60A5FA"><animateMotion dur="5.3s" begin="-2.6s" repeatCount="indefinite" path="M26 -33 A 26 18 0 1 1 -26 -33 A 26 18 0 1 1 26 -33"/><animate attributeName="fill" values="#60A5FA;#60A5FA;#FB923C;#FB923C;#34D399;#34D399;#60A5FA" keyTimes="0;0.3;0.36;0.68;0.74;0.94;1" dur="6.7s" begin="-3.1s" repeatCount="indefinite"/></circle>
      <g fill="#6E6890"><circle cx="36" cy="-30" r="2.5"/><circle class="qd2 qc" cx="36" cy="-21" r="2.5"/><circle class="qd3 qc" cx="36" cy="-12" r="2.5"/></g>
    </g>
    <text x="1130" y="608" text-anchor="middle" class="aname">SALES</text>

    <g transform="translate(1530,510)">
      <use href="#pod"/>
      <circle r="4.5" fill="#60A5FA"><animateMotion dur="5.9s" begin="-3.9s" repeatCount="indefinite" path="M26 -33 A 26 18 0 1 1 -26 -33 A 26 18 0 1 1 26 -33"/><animate attributeName="fill" values="#60A5FA;#60A5FA;#FB923C;#FB923C;#34D399;#34D399;#60A5FA" keyTimes="0;0.3;0.36;0.68;0.74;0.94;1" dur="7.6s" begin="-4.9s" repeatCount="indefinite"/></circle>
      <g fill="#6E6890"><circle cx="36" cy="-30" r="2.5"/><circle class="qd2 qe" cx="36" cy="-21" r="2.5"/><circle class="qd3 qe" cx="36" cy="-12" r="2.5"/></g>
    </g>
    <text x="1530" y="608" text-anchor="middle" class="aname">SUPPORT</text>

    <!-- floor line -->
    <line x1="180" y1="640" x2="1740" y2="640" stroke="#17141F" stroke-width="1.5"/>

    <!-- status legend -->
    <g font-family="ui-monospace,Consolas,monospace" font-size="10" font-weight="600" letter-spacing="2">
      <circle cx="700" cy="676" r="3.5" fill="#60A5FA"/><text x="712" y="680" fill="#8F87AC">THINKING</text>
      <circle cx="850" cy="676" r="3.5" fill="#FB923C"/><text x="862" y="680" fill="#8F87AC">WORKING</text>
      <circle cx="1000" cy="676" r="3.5" fill="#34D399"/><text x="1012" y="680" fill="#8F87AC">DONE</text>
    </g>
  </g>

  <!-- foreground defocus pass -->
  <g class="fgSweep" filter="url(#blurFg)"><line x1="300" y1="100" x2="520" y2="330" stroke="#5D4FA0" stroke-width="26" stroke-linecap="round" opacity="0.5"/></g>

  <rect width="1920" height="800" fill="url(#vig)"/>
  <rect width="1920" height="800" filter="url(#grain)" opacity="0.5"/>

  <!-- ============ TITLES · above the grade ============ -->
  <text x="960" y="744" text-anchor="middle" class="cap capA">autonomous agents run the work.</text>
  <text x="66" y="66" class="slate" opacity="0.9">CH 05 · AGENTS · OPERATIONS CENTER</text>
</svg>
