<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 800" width="1920" height="800" fill="none" role="img" aria-label="Chapter 2 — Understanding: raw requests become structured intent">
  <defs>
    <radialGradient id="vig" cx="0.5" cy="0.5" r="0.72">
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/><stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="fogBlue" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#274A82" stop-opacity="0.07"/><stop offset="1" stop-color="#274A82" stop-opacity="0"/></radialGradient>
    <radialGradient id="fogViolet" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#4C3B7A" stop-opacity="0.05"/><stop offset="1" stop-color="#4C3B7A" stop-opacity="0"/></radialGradient>
    <linearGradient id="beamG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9BD9F2" stop-opacity="0"/><stop offset="0.5" stop-color="#D6F2FF" stop-opacity="0.9"/><stop offset="1" stop-color="#9BD9F2" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="beamGlow" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#5FB9DE" stop-opacity="0.16"/><stop offset="1" stop-color="#5FB9DE" stop-opacity="0"/></radialGradient>
    <linearGradient id="strandG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4E86D8"/><stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <radialGradient id="convG" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#BBD7FF" stop-opacity="0.85"/><stop offset="0.35" stop-color="#4E86D8" stop-opacity="0.4"/><stop offset="1" stop-color="#4E86D8" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" result="n"/><feColorMatrix in="n" type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.032"/></feComponentTransfer></filter>
    <filter id="blurFg" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7"/></filter>
    <radialGradient id="icGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#C4B5FD" stop-opacity="0.45"/><stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>

    <!-- raw input glyphs · violet before refraction -->
    <g id="icVoice" stroke="currentColor" fill="none" stroke-linecap="round">
      <rect x="-4" y="-11" width="8" height="13" rx="4" stroke-width="1.8"/>
      <path d="M-7.5 -1 a7.5 7.5 0 0 0 15 0" stroke-width="1.8"/>
      <path d="M0 6.5 v4.5 M-4.5 11 h9" stroke-width="1.8"/>
    </g>
    <g id="icText" stroke="currentColor" fill="none" stroke-linejoin="round" stroke-linecap="round">
      <path d="M-11 -9 h22 v14 h-13 l-6 6 v-6 h-3 z" stroke-width="1.8"/>
      <path d="M-6 -4 h12 M-6 0 h8" stroke-width="1.6"/>
    </g>
    <g id="icImage" stroke="currentColor" fill="none" stroke-linejoin="round">
      <rect x="-11" y="-9" width="22" height="18" rx="3" stroke-width="1.8"/>
      <circle cx="-4.5" cy="-3.5" r="2.3" fill="currentColor" stroke="none"/>
      <path d="M-10 7 L-3 0 L1 4 L5 1 L10 6" stroke-width="1.8"/>
    </g>
    <g id="icDocs" stroke="currentColor" fill="none" stroke-linejoin="round">
      <path d="M-8 -11 h11 l6 6 v16 h-17 z" stroke-width="1.8"/>
      <path d="M3 -11 v6 h6" stroke-width="1.5"/>
      <path d="M-4 1 h9 M-4 5 h9 M-4 9 h6" stroke-width="1.5"/>
    </g>
    <g id="icApi" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-4 -9 L-12 0 L-4 9" stroke-width="2"/>
      <path d="M4 -9 L12 0 L4 9" stroke-width="2"/>
      <path d="M1.5 -10 L-1.5 10" stroke-width="2"/>
    </g>
    <g id="icEmail" stroke="currentColor" fill="none" stroke-linejoin="round">
      <rect x="-12" y="-8" width="24" height="16" rx="2.5" stroke-width="1.8"/>
      <path d="M-12 -6 L0 3 L12 -6" stroke-width="1.8"/>
    </g>

    <style>
      .cap{font:600 21px ui-monospace,Consolas,monospace;fill:#F1EDFB;letter-spacing:5px}
      .slate{font:600 11px ui-monospace,Consolas,monospace;fill:#A29BC0;letter-spacing:4px}
      .mlbl{font:600 11px ui-monospace,Consolas,monospace;fill:#DAD4EE;letter-spacing:2px}
      .blbl{font:600 11px ui-monospace,Consolas,monospace;fill:#9AC4E8;letter-spacing:3px}

      @keyframes worldBreathe{0%,100%{transform:scale(1)}50%{transform:scale(1.022)}}
      .world{transform-origin:960px 400px;animation:worldBreathe 14.4s ease-in-out infinite}

      /* meteor: fall from sky to beam crossing (relative delta shared by all lanes) */
      @keyframes fall{
        0%{transform:translate(-140px,-60px);opacity:0}
        6%{opacity:1}
        41%{opacity:1}
        45%{transform:translate(0px,470px);opacity:0}
        100%{transform:translate(0px,470px);opacity:0}
      }
      .fall{animation:fall 4.8s cubic-bezier(0.35,0.1,0.6,0.9) infinite}
      @keyframes flash{
        0%,44%{transform:scale(0.2);opacity:0}
        45%{opacity:0.95}
        53%{transform:scale(2.6);opacity:0}
        100%{transform:scale(0.2);opacity:0}
      }
      .flash{animation:flash 4.8s ease-out infinite}
      .d0{animation-delay:0s}.d1{animation-delay:-0.8s}.d2{animation-delay:-1.6s}
      .d3{animation-delay:-2.4s}.d4{animation-delay:-3.2s}.d5{animation-delay:-4s}

      @keyframes crawl{to{stroke-dashoffset:-96}}
      .thread{stroke:#3E6FB8;stroke-width:1.5;opacity:0.28;stroke-dasharray:3 9;animation:crawl 2.2s linear infinite}
      @keyframes crawlFast{to{stroke-dashoffset:-120}}
      .strand{stroke-dasharray:8 7;animation:crawlFast 1.15s linear infinite}
      @keyframes convPulse{0%,100%{transform:scale(1);opacity:0.8}50%{transform:scale(1.28);opacity:1}}
      .conv{transform-origin:1520px 640px;animation:convPulse 3.6s ease-in-out infinite}

      @keyframes glint{0%{transform:translateX(0);opacity:0}12%{opacity:0.9}50%{opacity:0.9}62%,100%{transform:translateX(1150px);opacity:0}}
      .glint{animation:glint 4.8s cubic-bezier(0.4,0,0.6,1) infinite}
      @keyframes beamBreathe{0%,100%{opacity:0.45}50%{opacity:0.75}}
      .beamB{animation:beamBreathe 3.2s ease-in-out infinite}

      @keyframes rise{0%{transform:translateY(0);opacity:0}20%{opacity:0.5}100%{transform:translateY(-110px);opacity:0}}
      .dust{animation:rise 5.6s linear infinite}
      .du1{animation-delay:-1s}.du2{animation-delay:-2.4s}.du3{animation-delay:-3.8s}.du4{animation-delay:-4.9s}

      @keyframes tw{0%,100%{opacity:0.14}50%{opacity:0.6}}
      .tw1{animation:tw 3.6s ease-in-out infinite}
      .tw2{animation:tw 4.9s ease-in-out infinite 1.1s}
      .tw3{animation:tw 6.1s ease-in-out infinite 2.3s}
      @keyframes fogDrift{0%,100%{transform:translate(0,0)}50%{transform:translate(64px,-26px)}}
      .fogDrift{animation:fogDrift 23s ease-in-out infinite}
      @keyframes fogDrift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-58px,30px)}}
      .fogDrift2{animation:fogDrift2 27s ease-in-out infinite}

      @keyframes fgSweep{0%{transform:translate(-420px,-260px);opacity:0}18%{opacity:0.2}55%{opacity:0.2}100%{transform:translate(760px,470px);opacity:0}}
      .fgSweep{animation:fgSweep 7.2s cubic-bezier(0.3,0.1,0.6,0.9) infinite}

      @keyframes cap{0%,18%{opacity:0}25%,58%{opacity:1}66%,100%{opacity:0}}
      .capA{animation:cap 14.4s linear infinite}
    </style>
  </defs>

  <!-- ============ STAGE ============ -->
  <rect width="1920" height="800" fill="#050505"/>
  <g class="fogDrift"><ellipse cx="1250" cy="260" rx="820" ry="360" fill="url(#fogBlue)"/></g>
  <g class="fogDrift2"><ellipse cx="480" cy="600" rx="720" ry="340" fill="url(#fogViolet)"/></g>

  <g class="world">
    <!-- stars -->
    <g fill="#6E67A0">
      <circle class="tw1" cx="200" cy="140" r="1.6"/><circle class="tw2" cx="760" cy="90" r="1.4"/>
      <circle class="tw3" cx="1500" cy="150" r="1.6"/><circle class="tw1" cx="1810" cy="330" r="1.5"/>
      <circle class="tw2" cx="120" cy="520" r="1.5"/><circle class="tw3" cx="1720" cy="700" r="1.5"/>
    </g>
    <g fill="#8C86B8">
      <circle class="tw2" cx="420" cy="260" r="1.8"/><circle class="tw1" cx="1650" cy="240" r="1.7"/>
      <circle class="tw3" cx="260" cy="700" r="1.7"/><circle class="tw2" cx="900" cy="740" r="1.6"/>
    </g>

    <!-- ============ THE SCANNING BEAM ============ -->
    <ellipse class="beamB" cx="960" cy="470" rx="700" ry="30" fill="url(#beamGlow)"/>
    <line x1="300" y1="470" x2="1620" y2="470" stroke="url(#beamG)" stroke-width="2"/>
    <g class="glint"><line x1="340" y1="470" x2="470" y2="470" stroke="#EAF8FF" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/></g>
    <text x="1620" y="448" text-anchor="end" class="blbl">INTENT DETECTION</text>

    <!-- ============ THREADS · structure below the beam ============ -->
    <path class="thread" d="M460 470 L1520 640"/>
    <path class="thread" d="M640 470 L1520 640"/>
    <path class="thread" d="M820 470 L1520 640"/>
    <path class="thread" d="M1000 470 L1520 640"/>
    <path class="thread" d="M1180 470 L1520 640"/>
    <path class="thread" d="M1360 470 L1520 640"/>

    <!-- packets riding the threads (blue = reasoning) -->
    <g fill="#7FB3FF">
      <circle r="4"><animateMotion dur="4.8s" begin="0s" repeatCount="indefinite" calcMode="linear" keyPoints="0;0;1;1" keyTimes="0;0.45;0.78;1" path="M460 470 L1520 640"/><animate attributeName="opacity" values="0;0;0.95;0.95;0;0" keyTimes="0;0.45;0.5;0.73;0.78;1" dur="4.8s" begin="0s" repeatCount="indefinite"/></circle>
      <circle r="4"><animateMotion dur="4.8s" begin="-0.8s" repeatCount="indefinite" calcMode="linear" keyPoints="0;0;1;1" keyTimes="0;0.45;0.78;1" path="M640 470 L1520 640"/><animate attributeName="opacity" values="0;0;0.95;0.95;0;0" keyTimes="0;0.45;0.5;0.73;0.78;1" dur="4.8s" begin="-0.8s" repeatCount="indefinite"/></circle>
      <circle r="4"><animateMotion dur="4.8s" begin="-1.6s" repeatCount="indefinite" calcMode="linear" keyPoints="0;0;1;1" keyTimes="0;0.45;0.78;1" path="M820 470 L1520 640"/><animate attributeName="opacity" values="0;0;0.95;0.95;0;0" keyTimes="0;0.45;0.5;0.73;0.78;1" dur="4.8s" begin="-1.6s" repeatCount="indefinite"/></circle>
      <circle r="4"><animateMotion dur="4.8s" begin="-2.4s" repeatCount="indefinite" calcMode="linear" keyPoints="0;0;1;1" keyTimes="0;0.45;0.78;1" path="M1000 470 L1520 640"/><animate attributeName="opacity" values="0;0;0.95;0.95;0;0" keyTimes="0;0.45;0.5;0.73;0.78;1" dur="4.8s" begin="-2.4s" repeatCount="indefinite"/></circle>
      <circle r="4"><animateMotion dur="4.8s" begin="-3.2s" repeatCount="indefinite" calcMode="linear" keyPoints="0;0;1;1" keyTimes="0;0.45;0.78;1" path="M1180 470 L1520 640"/><animate attributeName="opacity" values="0;0;0.95;0.95;0;0" keyTimes="0;0.45;0.5;0.73;0.78;1" dur="4.8s" begin="-3.2s" repeatCount="indefinite"/></circle>
      <circle r="4"><animateMotion dur="4.8s" begin="-4s" repeatCount="indefinite" calcMode="linear" keyPoints="0;0;1;1" keyTimes="0;0.45;0.78;1" path="M1360 470 L1520 640"/><animate attributeName="opacity" values="0;0;0.95;0.95;0;0" keyTimes="0;0.45;0.5;0.73;0.78;1" dur="4.8s" begin="-4s" repeatCount="indefinite"/></circle>
    </g>

    <!-- ============ METEORS · raw requests above the beam ============ -->
    <g stroke-linecap="round">
      <g transform="translate(460,0)"><g class="fall d0"><line x1="-6" y1="-6" x2="-34" y2="-124" stroke="#A78BFA" stroke-width="3" opacity="0.5"/><circle r="22" fill="url(#icGlow)"/><use href="#icVoice" color="#E9DFFF"/><text x="22" y="5" class="mlbl">VOICE</text></g></g>
      <g transform="translate(640,0)"><g class="fall d1"><line x1="-6" y1="-6" x2="-34" y2="-124" stroke="#A78BFA" stroke-width="3" opacity="0.5"/><circle r="22" fill="url(#icGlow)"/><use href="#icText" color="#E9DFFF"/><text x="22" y="5" class="mlbl">TEXT</text></g></g>
      <g transform="translate(820,0)"><g class="fall d2"><line x1="-6" y1="-6" x2="-34" y2="-124" stroke="#A78BFA" stroke-width="3" opacity="0.5"/><circle r="22" fill="url(#icGlow)"/><use href="#icImage" color="#E9DFFF"/><text x="22" y="5" class="mlbl">IMAGE</text></g></g>
      <g transform="translate(1000,0)"><g class="fall d3"><line x1="-6" y1="-6" x2="-34" y2="-124" stroke="#A78BFA" stroke-width="3" opacity="0.5"/><circle r="22" fill="url(#icGlow)"/><use href="#icDocs" color="#E9DFFF"/><text x="22" y="5" class="mlbl">DOCS</text></g></g>
      <g transform="translate(1180,0)"><g class="fall d4"><line x1="-6" y1="-6" x2="-34" y2="-124" stroke="#A78BFA" stroke-width="3" opacity="0.5"/><circle r="22" fill="url(#icGlow)"/><use href="#icApi" color="#E9DFFF"/><text x="22" y="5" class="mlbl">API</text></g></g>
      <g transform="translate(1360,0)"><g class="fall d5"><line x1="-6" y1="-6" x2="-34" y2="-124" stroke="#A78BFA" stroke-width="3" opacity="0.5"/><circle r="22" fill="url(#icGlow)"/><use href="#icEmail" color="#E9DFFF"/><text x="22" y="5" class="mlbl">EMAIL</text></g></g>
    </g>

    <!-- refraction flashes at each crossing -->
    <g fill="none" stroke="#D6F2FF" stroke-width="2">
      <g transform="translate(460,470)"><circle class="flash d0" r="11"/></g>
      <g transform="translate(640,470)"><circle class="flash d1" r="11"/></g>
      <g transform="translate(820,470)"><circle class="flash d2" r="11"/></g>
      <g transform="translate(1000,470)"><circle class="flash d3" r="11"/></g>
      <g transform="translate(1180,470)"><circle class="flash d4" r="11"/></g>
      <g transform="translate(1360,470)"><circle class="flash d5" r="11"/></g>
    </g>

    <!-- rejected fragments dissolving upward -->
    <g fill="#7A7396">
      <circle class="dust" cx="560" cy="452" r="1.8"/>
      <circle class="dust du1" cx="905" cy="450" r="1.6"/>
      <circle class="dust du2" cx="1090" cy="455" r="1.8"/>
      <circle class="dust du3" cx="740" cy="450" r="1.5"/>
      <circle class="dust du4" cx="1275" cy="452" r="1.6"/>
    </g>

    <!-- ============ CONVERGENCE · context braids into one strand ============ -->
    <circle class="conv" cx="1520" cy="640" r="46" fill="url(#convG)"/>
    <circle cx="1520" cy="640" r="6.5" fill="#EAF2FF"/>
    <path class="strand" d="M1520 640 C 1680 638 1800 626 1990 618" stroke="url(#strandG)" stroke-width="4"/>
    <path d="M1520 640 C 1680 638 1800 626 1990 618" stroke="#DCE9FF" stroke-width="1.4" opacity="0.5"/>
    <text x="1500" y="700" text-anchor="end" class="blbl" opacity="0.9">CONTEXT</text>
  </g>

  <!-- foreground depth: out-of-focus passing streak -->
  <g class="fgSweep" filter="url(#blurFg)"><line x1="300" y1="100" x2="520" y2="330" stroke="#5D4FA0" stroke-width="26" stroke-linecap="round" opacity="0.5"/></g>

  <rect width="1920" height="800" fill="url(#vig)"/>
  <rect width="1920" height="800" filter="url(#grain)" opacity="0.5"/>

  <!-- ============ TITLES · above the grade ============ -->
  <text x="960" y="740" text-anchor="middle" class="cap capA">raw requests become understanding.</text>
  <text x="66" y="66" class="slate" opacity="0.9">CH 02 · UNDERSTANDING</text>
</svg>
