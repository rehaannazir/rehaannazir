<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 640" width="1920" height="640" fill="none" role="img" aria-label="From request to production: how Rehan Nazir builds AI systems">
  <defs>
    <radialGradient id="amb" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nameG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F5F3F9"/><stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.035"/></feComponentTransfer>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="2.5" orient="auto"><path d="M0 0 L6 2.5 L0 5 Z" fill="#54506A"/></marker>

    <style>
      .idx{font:600 11px ui-monospace,Consolas,monospace;fill:#4E4A62;letter-spacing:3px}
      .lbl{font:600 13px 'Segoe UI',Helvetica,Arial,sans-serif;fill:#DCD8E8}
      .sub{font:500 11px ui-monospace,Consolas,monospace;fill:#57536C}
      .micro{font:600 10px ui-monospace,Consolas,monospace;fill:#6B6684}
      .tag{font:600 15px 'Segoe UI',Helvetica,Arial,sans-serif;fill:#B7B0CC;letter-spacing:1px}
      .headline{font:800 30px 'Segoe UI',Helvetica,Arial,sans-serif;letter-spacing:2px}
      .name{font:800 40px 'Segoe UI',Helvetica,Arial,sans-serif;letter-spacing:4px}
      .chip rect{fill:#070609;stroke:#26213A}
      .chip.hot rect{stroke:#6D4FCE}
      .edge{stroke:#241F36;stroke-width:1.4}
      .edgeHot{stroke:#8B5CF6;stroke-width:1.4}

      @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
      .core-ring{transform-origin:960px 300px;animation:breathe 4.2s ease-in-out infinite}
      @keyframes corepulse{0%{r:9;opacity:.9}100%{r:40;opacity:0}}
      .core-pulse{animation:corepulse 3.4s ease-out infinite}
      @keyframes livepulse{0%,100%{opacity:1}50%{opacity:.3}}
      .live{animation:livepulse 1.7s ease-in-out infinite}
      @keyframes flow{to{stroke-dashoffset:-24}}
      .flow{stroke-dasharray:2 6;animation:flow 1.1s linear infinite}
      @keyframes flowRev{to{stroke-dashoffset:24}}
      .flowRev{stroke-dasharray:2 6;animation:flowRev 1.1s linear infinite}
      @keyframes drift1{0%{transform:translate(0,0)}50%{transform:translate(30px,-18px)}100%{transform:translate(0,0)}}
      @keyframes drift2{0%{transform:translate(0,0)}50%{transform:translate(-24px,16px)}100%{transform:translate(0,0)}}
      .d1{animation:drift1 9s ease-in-out infinite}
      .d2{animation:drift2 11s ease-in-out infinite}
      .d3{animation:drift1 13s ease-in-out infinite}

      /* ===== master 40s scene timeline (crossfades) ===== */
      @keyframes s1{0%{opacity:1}8.5%{opacity:1}10%{opacity:0}99%{opacity:0}100%{opacity:1}}
      @keyframes s2{0%,9%{opacity:0}11%{opacity:1}19%{opacity:1}21%{opacity:0}100%{opacity:0}}
      @keyframes s3{0%,19%{opacity:0}21%{opacity:1}31.5%{opacity:1}33.5%{opacity:0}100%{opacity:0}}
      @keyframes s4{0%,32%{opacity:0}34%{opacity:1}44%{opacity:1}46%{opacity:0}100%{opacity:0}}
      @keyframes s5{0%,44%{opacity:0}46%{opacity:1}54%{opacity:1}56%{opacity:0}100%{opacity:0}}
      @keyframes s6{0%,54%{opacity:0}56%{opacity:1}64%{opacity:1}66%{opacity:0}100%{opacity:0}}
      @keyframes s7{0%,64%{opacity:0}66%{opacity:1}76.5%{opacity:1}78.5%{opacity:0}100%{opacity:0}}
      @keyframes sF{0%,76%{opacity:0}78%{opacity:1}99%{opacity:1}100%{opacity:0}}
      .scene{animation-duration:40s;animation-timing-function:linear;animation-iteration-count:infinite}
      .s1{animation-name:s1}.s2{animation-name:s2}.s3{animation-name:s3}.s4{animation-name:s4}
      .s5{animation-name:s5}.s6{animation-name:s6}.s7{animation-name:s7}.sF{animation-name:sF}

      @keyframes fl1{0%,76%{opacity:0}79%{opacity:1}99%{opacity:1}100%{opacity:0}}
      @keyframes fl2{0%,78%{opacity:0}81%{opacity:1}99%{opacity:1}100%{opacity:0}}
      @keyframes fl3{0%,80%{opacity:0}83%{opacity:1}99%{opacity:1}100%{opacity:0}}
      .fl1{animation:fl1 40s linear infinite}.fl2{animation:fl2 40s linear infinite}.fl3{animation:fl3 40s linear infinite}
    </style>
  </defs>

  <!-- ============ BACKDROP ============ -->
  <rect x="1" y="1" width="1918" height="638" rx="24" fill="#050505" stroke="#17141C"/>
  <rect x="1" y="1" width="1918" height="638" rx="24" fill="url(#amb)"/>
  <rect x="1" y="1" width="1918" height="638" rx="24" filter="url(#grain)" opacity="0.5"/>

  <!-- floating particles (always alive, independent of scene timeline) -->
  <g fill="#8B5CF6">
    <circle class="d1" cx="180" cy="120" r="2" opacity="0.35"/>
    <circle class="d2" cx="1740" cy="150" r="1.6" opacity="0.3"/>
    <circle class="d3" cx="120" cy="500" r="2" opacity="0.3"/>
    <circle class="d1" cx="1800" cy="520" r="1.6" opacity="0.28"/>
    <circle class="d2" cx="960" cy="80" r="1.4" opacity="0.3"/>
    <circle class="d3" cx="1500" cy="80" r="1.6" opacity="0.25"/>
  </g>
  <g fill="#E7E2F5" opacity="0.5">
    <circle class="d2" cx="700" cy="560" r="1.3"/>
    <circle class="d1" cx="1280" cy="560" r="1.3"/>
  </g>

  <!-- persistent LIVE indicator, ties to terminal.svg motif -->
  <g class="live" transform="translate(1792,44)">
    <circle cx="7" cy="7" r="4.5" fill="#8B5CF6"/><text x="18" y="11" class="micro" fill="#9E8FD1">LIVE SYSTEM</text>
  </g>

  <!-- persistent core (always visible: the constant through every scene) -->
  <circle cx="960" cy="300" r="58" fill="url(#coreGlow)" opacity="0.16"/>
  <g class="core-ring">
    <circle cx="960" cy="300" r="30" fill="none" stroke="#5B3D82" stroke-width="1.2" opacity="0.6"/>
  </g>
  <circle cx="960" cy="300" r="8" fill="#F3E8FF"/>
  <circle class="core-pulse" cx="960" cy="300" r="9" fill="none" stroke="#B98BF0"/>

  <!-- ================= SCENE 1 · USER ================= -->
  <g class="scene s1">
    <text x="140" y="90" class="idx">01 · SESSION START</text>
    <circle cx="300" cy="300" r="7" fill="#0A080D" stroke="#8B5CF6" stroke-width="1.4"/>
    <circle cx="300" cy="300" r="7" fill="none" stroke="#8B5CF6"><animate attributeName="r" values="7;18;7" dur="3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.7;0;0.7" dur="3s" repeatCount="indefinite"/></circle>
    <text x="300" y="336" text-anchor="middle" class="lbl">USER</text>
    <text x="300" y="354" text-anchor="middle" class="sub">initiates request</text>
    <path d="M320 300 H892" class="edge flow"/>
  </g>

  <!-- ================= SCENE 2 · MULTIMODAL INPUT ================= -->
  <g class="scene s2">
    <text x="140" y="90" class="idx">02 · MULTIMODAL INPUT</text>
    <g class="edge">
      <path d="M340 160 Q 640 160 892 292"/><path d="M340 240 Q 640 260 892 296"/>
      <path d="M340 360 Q 640 350 892 306"/><path d="M340 440 Q 640 420 892 310"/>
    </g>
    <g>
      <rect x="300" y="148" width="70" height="24" rx="6" class="chip" stroke-width="1"/><text x="335" y="164" text-anchor="middle" class="micro" fill="#B7B0CC">VOICE</text>
      <rect x="300" y="228" width="70" height="24" rx="6" class="chip" stroke-width="1"/><text x="335" y="244" text-anchor="middle" class="micro" fill="#B7B0CC">TEXT</text>
      <rect x="300" y="348" width="70" height="24" rx="6" class="chip" stroke-width="1"/><text x="335" y="364" text-anchor="middle" class="micro" fill="#B7B0CC">IMAGE</text>
      <rect x="300" y="428" width="70" height="24" rx="6" class="chip" stroke-width="1"/><text x="335" y="444" text-anchor="middle" class="micro" fill="#B7B0CC">DOCS</text>
    </g>
    <g fill="#E9D5FF">
      <circle r="3"><animate attributeName="cx" values="370;892" dur="2.6s" repeatCount="indefinite"/><animate attributeName="cy" values="160;292" dur="2.6s" repeatCount="indefinite"/></circle>
      <circle r="3"><animate attributeName="cx" values="370;892" dur="2.6s" begin="0.5s" repeatCount="indefinite"/><animate attributeName="cy" values="240;296" dur="2.6s" begin="0.5s" repeatCount="indefinite"/></circle>
      <circle r="3"><animate attributeName="cx" values="370;892" dur="2.6s" begin="1s" repeatCount="indefinite"/><animate attributeName="cy" values="360;306" dur="2.6s" begin="1s" repeatCount="indefinite"/></circle>
      <circle r="3"><animate attributeName="cx" values="370;892" dur="2.6s" begin="1.5s" repeatCount="indefinite"/><animate attributeName="cy" values="440;310" dur="2.6s" begin="1.5s" repeatCount="indefinite"/></circle>
    </g>
  </g>

  <!-- ================= SCENE 3 · AI GATEWAY ================= -->
  <g class="scene s3">
    <text x="140" y="90" class="idx">03 · AI GATEWAY</text>
    <path d="M960 254 L998 278 L998 322 L960 346 L922 322 L922 278 Z" fill="none" stroke="#6D4FCE" stroke-width="1.3"/>
    <text x="960" y="230" text-anchor="middle" class="tag">AI GATEWAY</text>

    <g class="edge flow"><path d="M998 285 L1300 190" marker-end="url(#ar)"/></g>
    <g class="edge flow"><path d="M1005 300 L1420 300" marker-end="url(#ar)"/></g>
    <g class="edge flow"><path d="M998 315 L1300 410" marker-end="url(#ar)"/></g>

    <g class="chip"><rect x="1300" y="176" width="88" height="28" rx="7" stroke-width="1"/><text x="1344" y="195" text-anchor="middle" class="micro" fill="#DCD8E8">GPT</text></g>
    <g class="chip hot"><rect x="1420" y="286" width="88" height="28" rx="7" stroke-width="1.2"/><text x="1464" y="305" text-anchor="middle" class="micro" fill="#EDE7FA">CLAUDE</text></g>
    <g class="chip"><rect x="1300" y="396" width="88" height="28" rx="7" stroke-width="1"/><text x="1344" y="415" text-anchor="middle" class="micro" fill="#DCD8E8">GEMINI</text></g>

    <text x="1464" y="278" text-anchor="middle" class="micro" fill="#7C74A8" opacity="0.9">184ms<animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" repeatCount="indefinite"/></text>
  </g>

  <!-- ================= SCENE 4 · RETRIEVAL ================= -->
  <g class="scene s4">
    <text x="140" y="90" class="idx">04 · RETRIEVAL</text>
    <g class="edge flow" marker-end="url(#ar)">
      <path d="M360 470 H540"/><path d="M660 470 H840"/><path d="M960 470 H1140"/><path d="M1260 470 H1440"/>
    </g>
    <g class="chip"><rect x="280" y="452" width="80" height="30" rx="8" stroke-width="1"/><text x="320" y="471" text-anchor="middle" class="micro" fill="#B7B0CC">DOCS</text></g>
    <g class="chip"><rect x="580" y="452" width="80" height="30" rx="8" stroke-width="1"/><text x="620" y="471" text-anchor="middle" class="micro" fill="#B7B0CC">CHUNK</text></g>
    <g class="chip"><rect x="880" y="452" width="80" height="30" rx="8" stroke-width="1"/><text x="920" y="471" text-anchor="middle" class="micro" fill="#B7B0CC">EMBED</text></g>
    <g class="chip hot"><rect x="1160" y="448" width="100" height="38" rx="9" stroke-width="1.3"/><text x="1210" y="471" text-anchor="middle" class="micro" fill="#EDE7FA">VECTOR DB</text></g>
    <circle cx="1210" cy="448" r="16" fill="none" stroke="#B98BF0"><animate attributeName="r" values="16;30;16" dur="2.8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;0;0.6" dur="2.8s" repeatCount="indefinite"/></circle>
    <g class="chip"><rect x="1460" y="452" width="96" height="30" rx="8" stroke-width="1"/><text x="1508" y="471" text-anchor="middle" class="micro" fill="#B7B0CC">CONTEXT</text></g>
    <path d="M1508 452 Q 1250 380 1000 320" class="edge flow" marker-end="url(#ar)"/>
  </g>

  <!-- ================= SCENE 5 · AGENT ORCHESTRATION ================= -->
  <g class="scene s5">
    <text x="140" y="90" class="idx">05 · AGENT ORCHESTRATION</text>
    <path d="M998 280 L1220 190" class="edgeHot flow" marker-end="url(#ar)"/>
    <path d="M998 320 L1220 410" class="edge" opacity="0.55" marker-end="url(#ar)"/>
    <g class="chip hot"><rect x="1220" y="164" width="110" height="30" rx="8" stroke-width="1.2"/><text x="1275" y="184" text-anchor="middle" class="micro" fill="#EDE7FA">TOOL CALL</text></g>
    <g class="chip"><rect x="1220" y="396" width="110" height="30" rx="8" stroke-width="1"/><text x="1275" y="416" text-anchor="middle" class="micro" fill="#B7B0CC">RESPOND</text></g>
    <path d="M1275 164 C 1120 60, 940 100, 968 258" fill="none" stroke="#4A4462" stroke-width="1.2" stroke-dasharray="2 6" marker-end="url(#ar)"><animate attributeName="stroke-dashoffset" values="0;-16" dur="1.3s" repeatCount="indefinite"/></path>
    <text x="1060" y="80" class="sub">iterate</text>
  </g>

  <!-- ================= SCENE 6 · AUTOMATION ================= -->
  <g class="scene s6">
    <text x="140" y="90" class="idx">06 · AUTOMATION</text>
    <g stroke="#8B5CF6" stroke-width="1.2" fill="none">
      <path d="M998 280 L1230 168" stroke-dasharray="230" stroke-dashoffset="230"><animate attributeName="stroke-dashoffset" values="230;0" dur="1s" begin=".2s" fill="freeze"/></path>
      <path d="M1010 292 L1250 292" stroke-dasharray="240" stroke-dashoffset="240"><animate attributeName="stroke-dashoffset" values="240;0" dur="1s" begin=".6s" fill="freeze"/></path>
      <path d="M998 320 L1230 432" stroke-dasharray="230" stroke-dashoffset="230"><animate attributeName="stroke-dashoffset" values="230;0" dur="1s" begin="1s" fill="freeze"/></path>
      <path d="M922 300 L690 300" stroke-dasharray="230" stroke-dashoffset="230"><animate attributeName="stroke-dashoffset" values="230;0" dur="1s" begin="1.4s" fill="freeze"/></path>
    </g>
    <g class="chip"><rect x="1230" y="150" width="90" height="28" rx="7" stroke-width="1"/><text x="1275" y="169" text-anchor="middle" class="micro" fill="#DCD8E8">SLACK</text></g>
    <g class="chip"><rect x="1250" y="278" width="96" height="28" rx="7" stroke-width="1"/><text x="1298" y="297" text-anchor="middle" class="micro" fill="#DCD8E8">GITHUB</text></g>
    <g class="chip"><rect x="1230" y="418" width="96" height="28" rx="7" stroke-width="1"/><text x="1278" y="437" text-anchor="middle" class="micro" fill="#DCD8E8">SHEETS</text></g>
    <g class="chip"><rect x="600" y="286" width="90" height="28" rx="7" stroke-width="1"/><text x="645" y="305" text-anchor="middle" class="micro" fill="#DCD8E8">API</text></g>
    <text x="1275" y="130" text-anchor="middle" class="micro" fill="#8B5CF6" opacity="0"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.6;0.65;1" dur="4s" begin="1.8s" fill="freeze"/>✓ trigger fired</text>
  </g>

  <!-- ================= SCENE 7 · PRODUCTION ================= -->
  <g class="scene s7">
    <text x="140" y="90" class="idx">07 · PRODUCTION</text>
    <g class="edgeHot flowRev"><path d="M1180 200 L1000 282"/><path d="M1180 400 L1000 318"/><path d="M1420 300 L1010 300"/></g>
    <g class="chip hot"><rect x="1180" y="186" width="94" height="28" rx="7" stroke-width="1.2"/><text x="1227" y="205" text-anchor="middle" class="micro" fill="#EDE7FA">FASTAPI</text></g>
    <g class="chip hot"><rect x="1180" y="386" width="94" height="28" rx="7" stroke-width="1.2"/><text x="1227" y="405" text-anchor="middle" class="micro" fill="#EDE7FA">DOCKER</text></g>
    <g class="chip hot"><rect x="1420" y="286" width="90" height="28" rx="7" stroke-width="1.2"/><text x="1465" y="305" text-anchor="middle" class="micro" fill="#EDE7FA">CLOUD</text></g>

    <g transform="translate(1560,470)">
      <polyline points="0,26 24,18 48,22 72,8 96,14 120,2" fill="none" stroke="#8B5CF6" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="0" y="46" class="micro" fill="#9E8FD1">99.9% UPTIME</text>
      <text x="0" y="62" class="micro" fill="#57536C">P95 · 184ms</text>
    </g>
  </g>

  <!-- ================= FINAL · NAME CARD ================= -->
  <g class="scene sF">
    <circle cx="960" cy="300" r="70" fill="url(#coreGlow)" opacity="0.12"/>
  </g>
  <g class="fl1"><text x="960" y="452" text-anchor="middle" class="headline" fill="url(#nameG)">BUILDING PRODUCTION AI SYSTEMS</text></g>
  <g class="fl2"><text x="960" y="486" text-anchor="middle" class="tag" fill="#8A84A8">AI Systems Engineer &#160;·&#160; Automation Specialist</text></g>
  <g class="fl3"><text x="960" y="546" text-anchor="middle" class="name" fill="url(#nameG)">REHAN NAZIR</text></g>
</svg>
