<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" width="900" height="240" fill="none" role="img" aria-label="AI system architecture">
  <defs>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5B8CFF"/><stop offset="1" stop-color="#B96BFF"/>
    </linearGradient>
    <radialGradient id="ng" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#4D7CFF" stop-opacity="0.28"/><stop offset="1" stop-color="#4D7CFF" stop-opacity="0"/>
    </radialGradient>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0 0 L7 3 L0 6 Z" fill="#6E6E88"/>
    </marker>
    <style>
      .lbl{font:600 13px 'Segoe UI',Helvetica,Arial,sans-serif;fill:#E6E6F0}
      .sub{font:500 10px ui-monospace,Consolas,monospace;fill:#7A7A94}
      .node rect{fill:#101017;stroke:#2A2A3A}
      @keyframes hop{0%,100%{opacity:.25}50%{opacity:1}}
      .d{animation:hop 2s ease-in-out infinite}
    </style>
  </defs>

  <rect x="1" y="1" width="898" height="238" rx="16" fill="#0A0A0F" stroke="#1C1C28"/>
  <circle cx="450" cy="120" r="220" fill="url(#ng)"/>

  <!-- connecting lines -->
  <g stroke="#3A3A50" stroke-width="1.5" marker-end="url(#ah)">
    <line x1="128" y1="120" x2="168" y2="120"/>
    <line x1="272" y1="120" x2="312" y2="120"/>
    <line x1="416" y1="120" x2="456" y2="120"/>
    <line x1="560" y1="120" x2="600" y2="120"/>
    <line x1="704" y1="120" x2="744" y2="120"/>
  </g>

  <!-- animated pulse dots along the flow -->
  <g fill="url(#flow)">
    <circle r="4"><animateMotion dur="4s" repeatCount="indefinite" path="M40,120 H860"/></circle>
    <circle r="4" opacity="0.7"><animateMotion dur="4s" begin="1.3s" repeatCount="indefinite" path="M40,120 H860"/></circle>
    <circle r="4" opacity="0.5"><animateMotion dur="4s" begin="2.6s" repeatCount="indefinite" path="M40,120 H860"/></circle>
  </g>

  <!-- nodes -->
  <g class="node">
    <g transform="translate(40,96)"><rect width="88" height="48" rx="10"/><text x="44" y="24" text-anchor="middle" class="lbl">User</text><text x="44" y="39" text-anchor="middle" class="sub">query</text></g>
    <g transform="translate(184,96)"><rect width="88" height="48" rx="10" stroke="#3B5BFF"/><text x="44" y="24" text-anchor="middle" class="lbl">LLM</text><text x="44" y="39" text-anchor="middle" class="sub">reason</text></g>
    <g transform="translate(328,96)"><rect width="88" height="48" rx="10"/><text x="44" y="24" text-anchor="middle" class="lbl">RAG</text><text x="44" y="39" text-anchor="middle" class="sub">retrieve</text></g>
    <g transform="translate(472,96)"><rect width="88" height="48" rx="10" stroke="#8A4BFF"/><text x="44" y="22" text-anchor="middle" class="lbl">Vector DB</text><text x="44" y="39" text-anchor="middle" class="sub">embeddings</text></g>
    <g transform="translate(616,96)"><rect width="88" height="48" rx="10" stroke="#8A4BFF"/><text x="44" y="24" text-anchor="middle" class="lbl">LangGraph</text><text x="44" y="39" text-anchor="middle" class="sub">orchestrate</text></g>
    <g transform="translate(760,96)"><rect width="100" height="48" rx="10"/><text x="50" y="24" text-anchor="middle" class="lbl">Tools</text><text x="50" y="39" text-anchor="middle" class="sub">act · API</text></g>
  </g>

  <!-- response loop -->
  <path d="M810 96 C810 40, 90 40, 84 92" stroke="#3A3A50" stroke-width="1.5" stroke-dasharray="5 5" marker-end="url(#ah)"/>
  <text x="450" y="34" text-anchor="middle" class="sub d">← response</text>

  <text x="24" y="210" class="sub">flow</text>
  <text x="60" y="210" class="lbl" font-size="12">User → LLM → RAG → Vector DB → LangGraph → Tools → Response</text>
</svg>
