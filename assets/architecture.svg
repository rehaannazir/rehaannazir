<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" width="900" height="240" fill="none" role="img" aria-label="AI system architecture">
  <defs>
    <radialGradient id="ng" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#7C3AED" stop-opacity="0.16"/><stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 Z" fill="#5A4A70"/></marker>
    <style>
      .lbl{font:600 13px 'Segoe UI',Helvetica,Arial,sans-serif;fill:#EDEDF2}
      .sub{font:500 10px ui-monospace,Consolas,monospace;fill:#6E6480}
      .node rect{fill:#050507;stroke:#241D2E}
      @keyframes hop{0%,100%{opacity:.25}50%{opacity:1}}
      .d{animation:hop 2s ease-in-out infinite}
    </style>
  </defs>
  <rect x="1" y="1" width="898" height="238" rx="16" fill="#000000" stroke="#17141C"/>
  <circle cx="450" cy="120" r="230" fill="url(#ng)"/>

  <g stroke="#2A2233" stroke-width="1.5" marker-end="url(#ah)">
    <line x1="128" y1="120" x2="168" y2="120"/><line x1="272" y1="120" x2="312" y2="120"/>
    <line x1="416" y1="120" x2="456" y2="120"/><line x1="560" y1="120" x2="600" y2="120"/>
    <line x1="704" y1="120" x2="744" y2="120"/>
  </g>
  <g fill="#A855F7">
    <circle r="3.5"><animateMotion dur="4s" repeatCount="indefinite" path="M40,120 H860"/></circle>
    <circle r="3.5" opacity="0.6"><animateMotion dur="4s" begin="1.3s" repeatCount="indefinite" path="M40,120 H860"/></circle>
    <circle r="3.5" opacity="0.4"><animateMotion dur="4s" begin="2.6s" repeatCount="indefinite" path="M40,120 H860"/></circle>
  </g>

  <g class="node">
    <g transform="translate(40,96)"><rect width="88" height="48" rx="10"/><text x="44" y="24" text-anchor="middle" class="lbl">User</text><text x="44" y="39" text-anchor="middle" class="sub">query</text></g>
    <g transform="translate(184,96)"><rect width="88" height="48" rx="10" stroke="#5B3D82"/><text x="44" y="24" text-anchor="middle" class="lbl">LLM</text><text x="44" y="39" text-anchor="middle" class="sub">reason</text></g>
    <g transform="translate(328,96)"><rect width="88" height="48" rx="10"/><text x="44" y="24" text-anchor="middle" class="lbl">RAG</text><text x="44" y="39" text-anchor="middle" class="sub">retrieve</text></g>
    <g transform="translate(472,96)"><rect width="88" height="48" rx="10" stroke="#7C3AED"/><text x="44" y="22" text-anchor="middle" class="lbl">Vector DB</text><text x="44" y="39" text-anchor="middle" class="sub">embeddings</text></g>
    <g transform="translate(616,96)"><rect width="88" height="48" rx="10" stroke="#7C3AED"/><text x="44" y="24" text-anchor="middle" class="lbl">LangGraph</text><text x="44" y="39" text-anchor="middle" class="sub">orchestrate</text></g>
    <g transform="translate(760,96)"><rect width="100" height="48" rx="10"/><text x="50" y="24" text-anchor="middle" class="lbl">Tools</text><text x="50" y="39" text-anchor="middle" class="sub">act · API</text></g>
  </g>

  <path d="M810 96 C810 40, 90 40, 84 92" stroke="#2A2233" stroke-width="1.5" stroke-dasharray="5 5" marker-end="url(#ah)"/>
  <text x="450" y="34" text-anchor="middle" class="sub d">← response</text>
  <text x="24" y="210" class="sub">flow</text>
  <text x="60" y="210" class="lbl" font-size="12">User → LLM → RAG → Vector DB → LangGraph → Tools → Response</text>
</svg>
