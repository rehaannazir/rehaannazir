<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 800" width="1920" height="800" fill="none" role="img" aria-label="Chapter 4 — Intelligence: prompts assemble, minds awaken, decisions form">
  <defs>
    <radialGradient id="vig" cx="0.5" cy="0.5" r="0.72">
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/><stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="fogBlue" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#1C3A6E" stop-opacity="0.08"/><stop offset="1" stop-color="#1C3A6E" stop-opacity="0"/></radialGradient>
    <radialGradient id="fogViolet" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#4C3B7A" stop-opacity="0.06"/><stop offset="1" stop-color="#4C3B7A" stop-opacity="0"/></radialGradient>
    <radialGradient id="blockGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8FA8F5" stop-opacity="0.5"/><stop offset="0.5" stop-color="#5B6EE8" stop-opacity="0.22"/><stop offset="1" stop-color="#5B6EE8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCl" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFC9AE" stop-opacity="0.8"/><stop offset="0.45" stop-color="#D97757" stop-opacity="0.35"/><stop offset="1" stop-color="#D97757" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGp" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#9FF2D9" stop-opacity="0.8"/><stop offset="0.45" stop-color="#10A37F" stop-opacity="0.35"/><stop offset="1" stop-color="#10A37F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGe" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#B8D4FF" stop-opacity="0.8"/><stop offset="0.45" stop-color="#4E8DF5" stop-opacity="0.35"/><stop offset="1" stop-color="#4E8DF5" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" result="n"/><feColorMatrix in="n" type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.032"/></feComponentTransfer></filter>
    <filter id="blurFg" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7"/></filter>

    <!-- cute glowing circuit-brain · one mind -->
    <g id="brain">
      <path d="M0 -26 C -8 -34 -24 -32 -28 -22 C -40 -20 -44 -6 -36 0 C -42 8 -36 20 -26 22 C -22 30 -8 32 0 26 C 8 32 22 30 26 22 C 36 20 42 8 36 0 C 44 -6 40 -20 28 -22 C 24 -32 8 -34 0 -26 Z"
            fill="#0A0F1E" fill-opacity="0.8" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <path d="M0 -26 C 2 -12 -2 12 0 26" stroke="currentColor" stroke-opacity="0.5" stroke-width="1.5" fill="none"/>
      <g stroke="currentColor" stroke-opacity="0.85" stroke-width="1.4" fill="none" stroke-linecap="round">
        <path d="M-20 -10 h8 v8"/><path d="M-24 8 h7"/><path d="M-10 14 v-7 h-5"/>
        <path d="M20 -12 v8 h-7"/><path d="M24 6 h-7 v7"/><path d="M10 -16 v6"/>
      </g>
      <g fill="currentColor">
        <circle cx="-12" cy="-2" r="1.9"/><circle cx="-17" cy="8" r="1.9"/>
        <circle cx="13" cy="-4" r="1.9"/><circle cx="17" cy="13" r="1.9"/><circle cx="10" cy="-10" r="1.9"/><circle cx="-10" cy="14" r="1.9"/>
      </g>
    </g>

    <style>
      .cap{font:600 21px ui-monospace,Consolas,monospace;fill:#F1EDFB;letter-spacing:5px}
      .slate{font:600 11px ui-monospace,Consolas,monospace;fill:#A29BC0;letter-spacing:4px}
      .blbl{font:600 11px ui-monospace,Consolas,monospace;fill:#9DB4E8;letter-spacing:3px}
      .mname{font:700 13px ui-monospace,Consolas,monospace;fill:#DCE4F8;letter-spacing:3px}
      .slabT{font:600 11px ui-monospace,Consolas,monospace;fill:#C9D4F2;letter-spacing:2px}

      @keyframes worldBreathe{0%,100%{transform:scale(1)}50%{transform:scale(1.022)}}
      .world{transform-origin:960px 400px;animation:worldBreathe 18s ease-in-out infinite}

      /* ---- prompt slabs docking from four directions (6s cycle) ---- */
      @keyframes slabT{0%{transform:translate(0,-260px);opacity:0}12%{opacity:0.95}50%{transform:translate(0,0);opacity:0.95}60%,100%{transform:translate(0,0);opacity:0}}
      @keyframes slabL{0%{transform:translate(-300px,0);opacity:0}12%{opacity:0.95}50%{transform:translate(0,0);opacity:0.95}60%,100%{transform:translate(0,0);opacity:0}}
      @keyframes slabB{0%{transform:translate(0,260px);opacity:0}12%{opacity:0.95}50%{transform:translate(0,0);opacity:0.95}60%,100%{transform:translate(0,0);opacity:0}}
      @keyframes slabR{0%{transform:translate(300px,0);opacity:0}12%{opacity:0.95}50%{transform:translate(0,0);opacity:0.95}60%,100%{transform:translate(0,0);opacity:0}}
      .slabT{animation:slabT 6s cubic-bezier(0.3,0.1,0.3,1) infinite}
      .slabL{animation:slabL 6s cubic-bezier(0.3,0.1,0.3,1) infinite -1.5s}
      .slabB{animation:slabB 6s cubic-bezier(0.3,0.1,0.3,1) infinite -3s}
      .slabR{animation:slabR 6s cubic-bezier(0.3,0.1,0.3,1) infinite -4.5s}

      @keyframes blockPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
      .block{transform-origin:620px 400px;animation:blockPulse 3s ease-in-out infinite}

      /* ---- minds awaken in round-robin (9s cycle, 3s each) ---- */
      @keyframes mindOn{0%{opacity:0.18}4%{opacity:1}29%{opacity:1}36%,100%{opacity:0.18}}
      .m0{animation:mindOn 9s ease-in-out infinite}
      .m1{animation:mindOn 9s ease-in-out infinite -6s}
      .m2{animation:mindOn 9s ease-in-out infinite -3s}
      @keyframes flick{0%,100%{opacity:0.15}20%{opacity:0.9}45%{opacity:0.3}70%{opacity:0.85}}
      .flick{animation:flick 0.62s linear infinite}
      .flick2{animation:flick 0.53s linear infinite -0.2s}

      @keyframes crawl{to{stroke-dashoffset:-96}}
      .stream{stroke-dasharray:3 8;animation:crawl 1.6s linear infinite}
      @keyframes orbitDash{to{stroke-dashoffset:-400}}
      .orbit{stroke-dasharray:2 12;animation:orbitDash 30s linear infinite}

      @keyframes junctionB{0%,100%{transform:scale(1);opacity:0.75}50%{transform:scale(1.18);opacity:1}}
      .junc{transform-origin:1700px 400px;animation:junctionB 2.6s ease-in-out infinite}

      @keyframes tw{0%,100%{opacity:0.14}50%{opacity:0.6}}
      .tw1{animation:tw 3.6s ease-in-out infinite}
      .tw2{animation:tw 4.9s ease-in-out infinite 1.1s}
      .tw3{animation:tw 6.1s ease-in-out infinite 2.3s}
      @keyframes fogDrift{0%,100%{transform:translate(0,0)}50%{transform:translate(58px,-26px)}}
      .fogDrift{animation:fogDrift 25s ease-in-out infinite}
      @keyframes fogDrift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-60px,26px)}}
      .fogDrift2{animation:fogDrift2 29s ease-in-out infinite}
      @keyframes fgSweep{0%{transform:translate(-420px,-260px);opacity:0}18%{opacity:0.18}55%{opacity:0.18}100%{transform:translate(760px,470px);opacity:0}}
      .fgSweep{animation:fgSweep 9s cubic-bezier(0.3,0.1,0.6,0.9) infinite}

      @keyframes cap{0%,20%{opacity:0}27%,58%{opacity:1}66%,100%{opacity:0}}
      .capA{animation:cap 18s linear infinite}
    </style>
  </defs>

  <!-- ============ STAGE ============ -->
  <rect width="1920" height="800" fill="#050505"/>
  <g class="fogDrift"><ellipse cx="1250" cy="400" rx="820" ry="380" fill="url(#fogBlue)"/></g>
  <g class="fogDrift2"><ellipse cx="500" cy="360" rx="700" ry="340" fill="url(#fogViolet)"/></g>

  <g class="world">
    <!-- ambient stars -->
    <g fill="#6E67A0">
      <circle class="tw1" cx="200" cy="130" r="1.5"/><circle class="tw2" cx="960" cy="90" r="1.4"/>
      <circle class="tw3" cx="1780" cy="150" r="1.5"/><circle class="tw1" cx="300" cy="700" r="1.5"/>
      <circle class="tw2" cx="1500" cy="720" r="1.4"/><circle class="tw3" cx="1060" cy="740" r="1.4"/>
    </g>

    <!-- ============ PROMPT ASSEMBLY ============ -->
    <circle cx="620" cy="400" r="150" fill="url(#blockGlow)"/>
    <!-- incoming slabs -->
    <g>
      <g transform="translate(620,318)"><g class="slabT"><rect x="-62" y="-17" width="124" height="34" rx="8" fill="#0A0D18" stroke="#3D4E9E" stroke-width="1.6"/><text y="4" text-anchor="middle" class="slabT">SYSTEM</text></g></g>
      <g transform="translate(538,400)"><g class="slabL"><rect x="-62" y="-17" width="124" height="34" rx="8" fill="#0A0D18" stroke="#3D4E9E" stroke-width="1.6"/><text y="4" text-anchor="middle" class="slabT">MEMORY</text></g></g>
      <g transform="translate(620,482)"><g class="slabB"><rect x="-62" y="-17" width="124" height="34" rx="8" fill="#081217" stroke="#1E5560" stroke-width="1.6"/><text y="4" text-anchor="middle" class="slabT" fill="#9FD8E4">CONTEXT</text></g></g>
      <g transform="translate(702,400)"><g class="slabR"><rect x="-62" y="-17" width="124" height="34" rx="8" fill="#0A0D18" stroke="#3D4E9E" stroke-width="1.6"/><text y="4" text-anchor="middle" class="slabT">VARIABLES</text></g></g>
    </g>
    <!-- the composite block -->
    <g class="block">
      <rect x="562" y="342" width="116" height="116" rx="16" fill="#0A0C16" stroke="#7186E8" stroke-width="2"/>
      <path d="M586 376 h68 M586 400 h68 M586 424 h44" stroke="#4A5CC0" stroke-width="3"/>
    </g>
    <text x="620" y="540" text-anchor="middle" class="blbl">PROMPT</text>

    <!-- ============ THE MINDS · orbital triad ============ -->
    <ellipse class="orbit" cx="1300" cy="400" rx="270" ry="215" stroke="#2C2A4A" stroke-width="1.2"/>

    <!-- streams from prompt to each mind (gated with its mind) -->
    <g fill="none" stroke="#4E6ED8" stroke-width="1.6">
      <path class="stream m0" d="M686 386 C 900 320 1080 270 1244 254"/>
      <path class="stream m1" d="M686 414 C 880 470 1000 500 1124 512"/>
      <path class="stream m2" d="M686 400 C 940 430 1180 470 1384 492"/>
    </g>

    <!-- CLAUDE · top -->
    <g>
      <g class="m0">
        <circle cx="1300" cy="240" r="60" fill="url(#glowCl)"/>
        <circle cx="1300" cy="240" r="16" fill="none" stroke="#F5B08E"><animate attributeName="r" values="16;54;16" dur="3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.7;0;0.7" dur="3s" repeatCount="indefinite"/></circle>
        <path class="flick" d="M1284 232 q8 -10 16 0 q8 10 16 0" stroke="#EC7BC8" stroke-width="1.6" fill="none"/>
        <path class="flick2" d="M1288 250 q7 8 14 0 q7 -8 14 0" stroke="#EC7BC8" stroke-width="1.3" fill="none"/>
      </g>
      <use href="#brain" color="#E0885A" transform="translate(1300,240) scale(1.2)"/>
      <circle cx="1300" cy="240" r="3.6" fill="#F0F3FF"><animate attributeName="r" values="3.6;5;3.6" dur="2.6s" repeatCount="indefinite"/></circle>
      <text x="1300" y="168" text-anchor="middle" class="mname">CLAUDE</text>
    </g>
    <!-- GPT · lower left -->
    <g>
      <g class="m1">
        <circle cx="1170" cy="520" r="56" fill="url(#glowGp)"/>
        <circle cx="1170" cy="520" r="15" fill="none" stroke="#6FE0BD"><animate attributeName="r" values="15;50;15" dur="3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.7;0;0.7" dur="3s" repeatCount="indefinite"/></circle>
        <path class="flick" d="M1156 512 q7 -9 14 0 q7 9 14 0" stroke="#EC7BC8" stroke-width="1.5" fill="none"/>
      </g>
      <use href="#brain" color="#26B896" transform="translate(1170,520)"/>
      <circle cx="1170" cy="520" r="3.2" fill="#F0F3FF"><animate attributeName="r" values="3.2;4.5;3.2" dur="2.9s" repeatCount="indefinite"/></circle>
      <text x="1170" y="596" text-anchor="middle" class="mname">GPT</text>
    </g>
    <!-- GEMINI · lower right -->
    <g>
      <g class="m2">
        <circle cx="1430" cy="500" r="56" fill="url(#glowGe)"/>
        <circle cx="1430" cy="500" r="15" fill="none" stroke="#93BCF9"><animate attributeName="r" values="15;50;15" dur="3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.7;0;0.7" dur="3s" repeatCount="indefinite"/></circle>
        <path class="flick2" d="M1416 492 q7 -9 14 0 q7 9 14 0" stroke="#EC7BC8" stroke-width="1.5" fill="none"/>
      </g>
      <use href="#brain" color="#5E97F6" transform="translate(1430,500)"/>
      <circle cx="1430" cy="500" r="3.2" fill="#F0F3FF"><animate attributeName="r" values="3.2;4.5;3.2" dur="3.1s" repeatCount="indefinite"/></circle>
      <text x="1430" y="576" text-anchor="middle" class="mname">GEMINI</text>
    </g>

    <!-- ============ TOKEN STREAMS → JUNCTION ============ -->
    <g fill="none" stroke="#2E3A5E" stroke-width="1.3">
      <path d="M1346 252 C 1500 280 1600 340 1688 392"/>
      <path d="M1212 516 C 1380 500 1560 450 1688 406"/>
      <path d="M1472 496 C 1560 470 1630 436 1690 404"/>
    </g>
    <g fill="#F2F4FE">
      <circle r="2.6" class="m0"><animateMotion dur="1.8s" repeatCount="indefinite" path="M1346 252 C 1500 280 1600 340 1688 392"/></circle>
      <circle r="2.2" class="m0"><animateMotion dur="1.8s" begin="-0.9s" repeatCount="indefinite" path="M1346 252 C 1500 280 1600 340 1688 392"/></circle>
      <circle r="2.6" class="m1"><animateMotion dur="1.8s" begin="-0.3s" repeatCount="indefinite" path="M1212 516 C 1380 500 1560 450 1688 406"/></circle>
      <circle r="2.2" class="m1"><animateMotion dur="1.8s" begin="-1.2s" repeatCount="indefinite" path="M1212 516 C 1380 500 1560 450 1688 406"/></circle>
      <circle r="2.6" class="m2"><animateMotion dur="1.8s" begin="-0.6s" repeatCount="indefinite" path="M1472 496 C 1560 470 1630 436 1690 404"/></circle>
      <circle r="2.2" class="m2"><animateMotion dur="1.8s" begin="-1.5s" repeatCount="indefinite" path="M1472 496 C 1560 470 1630 436 1690 404"/></circle>
    </g>

    <!-- ============ THE DECISION ============ -->
    <g class="junc"><path d="M1700 374 L1726 400 L1700 426 L1674 400 Z" fill="#0C0C18" stroke="#8B5CF6" stroke-width="2"/></g>
    <path d="M1717 383 L1950 290" stroke="#2C2A44" stroke-width="1.4"/>
    <path d="M1717 417 L1950 530" stroke="#6D4FCE" stroke-width="1.8"/>
    <text x="1872" y="272" text-anchor="middle" class="blbl" opacity="0.45">RESPOND</text>
    <text x="1872" y="562" text-anchor="middle" class="blbl" fill="#C9B8F5">ACT</text>
    <circle r="4.5" fill="#E4DBFB">
      <animateMotion dur="3s" repeatCount="indefinite" calcMode="linear" keyPoints="0;0;1;1" keyTimes="0;0.35;0.8;1" path="M1717 417 L1965 537"/>
      <animate attributeName="opacity" values="0;0;0.95;0.95;0" keyTimes="0;0.35;0.42;0.76;1" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- foreground defocus pass -->
  <g class="fgSweep" filter="url(#blurFg)"><line x1="300" y1="100" x2="520" y2="330" stroke="#4A5AA8" stroke-width="26" stroke-linecap="round" opacity="0.5"/></g>

  <rect width="1920" height="800" fill="url(#vig)"/>
  <rect width="1920" height="800" filter="url(#grain)" opacity="0.5"/>

  <!-- ============ TITLES · above the grade ============ -->
  <text x="960" y="740" text-anchor="middle" class="cap capA">reasoning becomes decision.</text>
  <text x="66" y="66" class="slate" opacity="0.9">CH 04 · INTELLIGENCE</text>
</svg>
