<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 800" width="1920" height="800" fill="none" role="img" aria-label="Final chapter — The Vision: every system converges into one core. Rehan Nazir, AI Systems Engineer.">
  <defs>
    <radialGradient id="vig" cx="0.5" cy="0.5" r="0.72">
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/><stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="fogViolet" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#4C3B7A" stop-opacity="0.08"/><stop offset="1" stop-color="#4C3B7A" stop-opacity="0"/></radialGradient>
    <radialGradient id="coreGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F3EEFF" stop-opacity="0.9"/><stop offset="0.3" stop-color="#A78BFA" stop-opacity="0.5"/><stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nameG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FAF8FC"/><stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" result="n"/><feColorMatrix in="n" type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.032"/></feComponentTransfer></filter>
    <filter id="blurFar" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="2.6"/></filter>

    <style>
      .slate{font:600 11px ui-monospace,Consolas,monospace;fill:#A29BC0;letter-spacing:4px}
      .name{font:800 52px 'Segoe UI',Helvetica,Arial,sans-serif;letter-spacing:6px}
      .role{font:700 19px 'Segoe UI',Helvetica,Arial,sans-serif;fill:#C9C2DC;letter-spacing:8px}
      .sub{font:600 14px ui-monospace,Consolas,monospace;fill:#8F87AC;letter-spacing:4px}

      /* ===== 20s master ===== */
      @keyframes coreClimax{0%{transform:scale(0.72)}45%{transform:scale(1.3)}60%{transform:scale(1.05)}90%{transform:scale(1)}100%{transform:scale(0.72)}}
      .core{transform-origin:960px 360px;animation:coreClimax 20s cubic-bezier(0.4,0.05,0.3,1) infinite}
      @keyframes partDim{0%,40%{opacity:1}55%,86%{opacity:0.3}96%,100%{opacity:1}}
      .streams{animation:partDim 20s linear infinite}
      @keyframes t1{0%,50%{opacity:0}56%,92%{opacity:1}97%,100%{opacity:0}}
      @keyframes t2{0%,54%{opacity:0}60%,92%{opacity:1}97%,100%{opacity:0}}
      @keyframes t3{0%,58%{opacity:0}64%,92%{opacity:1}97%,100%{opacity:0}}
      @keyframes t4{0%,61%{opacity:0}67%,92%{opacity:1}97%,100%{opacity:0}}
      .t1{animation:t1 20s linear infinite}
      .t2{animation:t2 20s linear infinite}
      .t3{animation:t3 20s linear infinite}
      .t4{animation:t4 20s linear infinite}

      @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
      @keyframes spinR{from{transform:rotate(360deg)}to{transform:rotate(0)}}
      .r1{transform-origin:960px 360px;animation:spin 40s linear infinite}
      .r2{transform-origin:960px 360px;animation:spinR 28s linear infinite}

      @keyframes tw{0%,100%{opacity:0.14}50%{opacity:0.6}}
      .tw1{animation:tw 3.6s ease-in-out infinite}
      .tw2{animation:tw 4.9s ease-in-out infinite 1.1s}
      .tw3{animation:tw 6.1s ease-in-out infinite 2.3s}
      @keyframes fogDrift{0%,100%{transform:translate(0,0)}50%{transform:translate(54px,-22px)}}
      .fogDrift{animation:fogDrift 26s ease-in-out infinite}
      @keyframes ghostFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
      .ghost{animation:ghostFloat 12s ease-in-out infinite}
    </style>
  </defs>

  <!-- ============ STAGE ============ -->
  <rect width="1920" height="800" fill="#050505"/>
  <g class="fogDrift"><ellipse cx="960" cy="380" rx="900" ry="420" fill="url(#fogViolet)"/></g>

  <!-- ambient stars -->
  <g fill="#6E67A0">
    <circle class="tw1" cx="180" cy="120" r="1.6"/><circle class="tw2" cx="700" cy="80" r="1.4"/>
    <circle class="tw3" cx="1300" cy="110" r="1.5"/><circle class="tw1" cx="1780" cy="170" r="1.6"/>
    <circle class="tw2" cx="120" cy="600" r="1.5"/><circle class="tw3" cx="1830" cy="560" r="1.5"/>
    <circle class="tw1" cx="480" cy="720" r="1.4"/><circle class="tw2" cx="1500" cy="740" r="1.4"/>
  </g>

  <!-- ghost memories of the journey · far layer, each glowing softly in its chapter color -->
  <g filter="url(#blurFar)" fill="none">
    <g class="ghost" opacity="0.25">
      <ellipse cx="167" cy="238" rx="54" ry="46" fill="#EC7BC8" opacity="0.12"/>
      <path d="M180 220 C 176 204 148 202 144 218 C 128 220 124 240 138 246 C 132 260 148 272 162 264 C 172 274 190 268 190 254 C 204 250 202 228 188 226 C 190 216 184 212 180 220 Z" stroke="#EC7BC8" stroke-width="2"/>
    </g>
    <g class="ghost" opacity="0.25" style="animation-delay:-4s">
      <ellipse cx="1734" cy="225" rx="62" ry="54" fill="#22D3EE" opacity="0.1"/>
      <path d="M1690 190 v70 a44 12 0 0 0 88 0 v-70 a44 12 0 0 0 -88 0 a44 12 0 0 0 88 0" stroke="#22D3EE" stroke-width="2"/>
    </g>
    <g class="ghost" opacity="0.25" style="animation-delay:-7s">
      <ellipse cx="172" cy="581" rx="54" ry="46" fill="#A78BFA" opacity="0.12"/>
      <rect x="150" y="560" width="44" height="42" rx="14" stroke="#A78BFA" stroke-width="2"/>
      <path d="M150 572 L138 560 M194 572 L206 560" stroke="#A78BFA" stroke-width="2"/>
    </g>
    <g class="ghost" opacity="0.25" style="animation-delay:-9s">
      <ellipse cx="1688" cy="616" rx="54" ry="42" fill="#34D399" opacity="0.1"/>
      <path d="M1660 600 h56 M1660 616 h44 M1660 632 h56" stroke="#34D399" stroke-width="2"/>
    </g>
  </g>

  <!-- ============ CONVERGENCE STREAMS · every color comes home ============ -->
  <g class="streams">
    <g stroke-width="1" opacity="0.5">
      <path d="M960 -40 L960 360" stroke="#EC7BC8" opacity="0.1"/>
      <path d="M1800 40 L960 360" stroke="#E0885A" opacity="0.1"/>
      <path d="M1960 400 L960 360" stroke="#34D399" opacity="0.1"/>
      <path d="M1800 760 L960 360" stroke="#FB923C" opacity="0.1"/>
      <path d="M960 840 L960 360" stroke="#FBBF24" opacity="0.1"/>
      <path d="M120 760 L960 360" stroke="#A78BFA" opacity="0.1"/>
      <path d="M-40 400 L960 360" stroke="#60A5FA" opacity="0.1"/>
      <path d="M120 40 L960 360" stroke="#22D3EE" opacity="0.1"/>
    </g>
    <g>
      <circle r="3.4" fill="#EC7BC8"><animateMotion dur="3.2s" begin="0s" repeatCount="indefinite" path="M960 -40 L960 360"/><animate attributeName="opacity" values="0;0.95;0.95;0" keyTimes="0;0.1;0.85;1" dur="3.2s" begin="0s" repeatCount="indefinite"/></circle>
      <circle r="2.6" fill="#EC7BC8"><animateMotion dur="3.2s" begin="-1.6s" repeatCount="indefinite" path="M960 -40 L960 360"/><animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.1;0.85;1" dur="3.2s" begin="-1.6s" repeatCount="indefinite"/></circle>
      <circle r="3.4" fill="#E0885A"><animateMotion dur="3.4s" begin="-0.4s" repeatCount="indefinite" path="M1800 40 L960 360"/><animate attributeName="opacity" values="0;0.95;0.95;0" keyTimes="0;0.1;0.85;1" dur="3.4s" begin="-0.4s" repeatCount="indefinite"/></circle>
      <circle r="2.6" fill="#E0885A"><animateMotion dur="3.4s" begin="-2.1s" repeatCount="indefinite" path="M1800 40 L960 360"/><animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.1;0.85;1" dur="3.4s" begin="-2.1s" repeatCount="indefinite"/></circle>
      <circle r="3.4" fill="#34D399"><animateMotion dur="3s" begin="-0.8s" repeatCount="indefinite" path="M1960 400 L960 360"/><animate attributeName="opacity" values="0;0.95;0.95;0" keyTimes="0;0.1;0.85;1" dur="3s" begin="-0.8s" repeatCount="indefinite"/></circle>
      <circle r="2.6" fill="#34D399"><animateMotion dur="3s" begin="-2.3s" repeatCount="indefinite" path="M1960 400 L960 360"/><animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.1;0.85;1" dur="3s" begin="-2.3s" repeatCount="indefinite"/></circle>
      <circle r="3.4" fill="#FB923C"><animateMotion dur="3.5s" begin="-1.2s" repeatCount="indefinite" path="M1800 760 L960 360"/><animate attributeName="opacity" values="0;0.95;0.95;0" keyTimes="0;0.1;0.85;1" dur="3.5s" begin="-1.2s" repeatCount="indefinite"/></circle>
      <circle r="3.4" fill="#FBBF24"><animateMotion dur="3.1s" begin="-1.5s" repeatCount="indefinite" path="M960 840 L960 360"/><animate attributeName="opacity" values="0;0.95;0.95;0" keyTimes="0;0.1;0.85;1" dur="3.1s" begin="-1.5s" repeatCount="indefinite"/></circle>
      <circle r="3.4" fill="#A78BFA"><animateMotion dur="3.3s" begin="-1.9s" repeatCount="indefinite" path="M120 760 L960 360"/><animate attributeName="opacity" values="0;0.95;0.95;0" keyTimes="0;0.1;0.85;1" dur="3.3s" begin="-1.9s" repeatCount="indefinite"/></circle>
      <circle r="3.4" fill="#60A5FA"><animateMotion dur="3.2s" begin="-2.4s" repeatCount="indefinite" path="M-40 400 L960 360"/><animate attributeName="opacity" values="0;0.95;0.95;0" keyTimes="0;0.1;0.85;1" dur="3.2s" begin="-2.4s" repeatCount="indefinite"/></circle>
      <circle r="2.6" fill="#60A5FA"><animateMotion dur="3.2s" begin="-0.9s" repeatCount="indefinite" path="M-40 400 L960 360"/><animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.1;0.85;1" dur="3.2s" begin="-0.9s" repeatCount="indefinite"/></circle>
      <circle r="3.4" fill="#22D3EE"><animateMotion dur="3.6s" begin="-2.8s" repeatCount="indefinite" path="M120 40 L960 360"/><animate attributeName="opacity" values="0;0.95;0.95;0" keyTimes="0;0.1;0.85;1" dur="3.6s" begin="-2.8s" repeatCount="indefinite"/></circle>
      <circle r="2.6" fill="#22D3EE"><animateMotion dur="3.6s" begin="-1.1s" repeatCount="indefinite" path="M120 40 L960 360"/><animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.1;0.85;1" dur="3.6s" begin="-1.1s" repeatCount="indefinite"/></circle>
    </g>
  </g>

  <!-- ============ THE AI CORE ============ -->
  <g class="core">
    <circle cx="960" cy="360" r="150" fill="url(#coreGlow)" opacity="0.85"/>
    <g class="r1"><circle cx="960" cy="360" r="96" fill="none" stroke="#5B4585" stroke-width="1.1" stroke-dasharray="3 9"/></g>
    <g class="r2"><circle cx="960" cy="360" r="70" fill="none" stroke="#7A5FC0" stroke-width="1.1" stroke-dasharray="40 140"/></g>
    <circle cx="960" cy="360" r="13" fill="#FBF9FF"/>
    <circle cx="960" cy="360" r="14" fill="none" stroke="#D8CBF8">
      <animate attributeName="r" values="14;68;14" dur="3.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;0;0.85" dur="3.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ============ THE REVEAL ============ -->
  <g class="t1"><text x="960" y="586" text-anchor="middle" class="name" fill="url(#nameG)">REHAN NAZIR</text></g>
  <g class="t2"><text x="960" y="624" text-anchor="middle" class="role">AI SYSTEMS ENGINEER</text></g>
  <g class="t3"><text x="960" y="662" text-anchor="middle" class="sub">building production AI systems</text></g>
  <g class="t4"><text x="960" y="692" text-anchor="middle" class="sub" fill="#7A6FA0">designing autonomous intelligence</text></g>

  <rect width="1920" height="800" fill="url(#vig)"/>
  <rect width="1920" height="800" filter="url(#grain)" opacity="0.5"/>

  <text x="66" y="66" class="slate" opacity="0.9">FINALE · THE VISION</text>
</svg>
