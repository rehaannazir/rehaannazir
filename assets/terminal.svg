<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320" fill="none" role="img" aria-label="Live status terminal">
  <defs>
    <linearGradient id="tbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#14141C"/><stop offset="1" stop-color="#0E0E15"/>
    </linearGradient>
    <style>
      .win{font:600 12px 'Segoe UI',Helvetica,Arial,sans-serif;fill:#6A6A82}
      .m{font:400 15px ui-monospace,'Cascadia Code',Consolas,monospace}
      .p{fill:#5B8CFF}.c{fill:#4A4A5E}.k{fill:#B96BFF}.v{fill:#E6E6F0}.g{fill:#3FD68C}.y{fill:#F5C453}
      @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
      .l{opacity:0;animation:rise .35s ease forwards}
      .l1{animation-delay:.3s}.l2{animation-delay:.8s}.l3{animation-delay:1.3s}.l4{animation-delay:1.8s}
      .l5{animation-delay:2.3s}.l6{animation-delay:2.8s}.l7{animation-delay:3.3s}.l8{animation-delay:3.8s}
      @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
      .cur{animation:blink 1s step-end infinite;animation-delay:4.1s;opacity:0}
      @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
      .live{animation:pulse 1.6s ease-in-out infinite}
    </style>
  </defs>

  <rect x="1" y="1" width="898" height="318" rx="16" fill="#0B0B11" stroke="#1C1C28"/>
  <path d="M1 17 a16 16 0 0 1 16 -16 H883 a16 16 0 0 1 16 16 V44 H1 Z" fill="url(#tbar)"/>
  <line x1="1" y1="44" x2="899" y2="44" stroke="#1C1C28"/>
  <circle cx="26" cy="22" r="6" fill="#FF5F57"/><circle cx="48" cy="22" r="6" fill="#FEBC2E"/><circle cx="70" cy="22" r="6" fill="#28C840"/>
  <text x="450" y="27" text-anchor="middle" class="win">rehan@nexara: ~/systems</text>

  <g class="live" transform="translate(788,15)">
    <circle cx="8" cy="7" r="5" fill="#3FD68C"/><text x="20" y="11" class="win" fill="#3FD68C">LIVE</text>
  </g>

  <g class="m">
    <text class="l l1" x="24" y="82"><tspan class="p">➜</tspan> <tspan class="c">~</tspan> <tspan class="v">whoami</tspan></text>
    <text class="l l2" x="24" y="108"><tspan class="g">rehan_nazir</tspan> <tspan class="c">// AI Production Systems Engineer</tspan></text>

    <text class="l l3" x="24" y="142"><tspan class="p">➜</tspan> <tspan class="c">~</tspan> <tspan class="v">cat status.json</tspan></text>
    <text class="l l4" x="24" y="168"><tspan class="c">{</tspan></text>
    <text class="l l5" x="24" y="194"><tspan class="k">   "building"</tspan><tspan class="c">:</tspan> <tspan class="y">"Nexara — autonomous AI agents"</tspan><tspan class="c">,</tspan></text>
    <text class="l l6" x="24" y="220"><tspan class="k">   "learning"</tspan><tspan class="c">:</tspan> <tspan class="y">"LangGraph · MLOps · Distributed Systems"</tspan><tspan class="c">,</tspan></text>
    <text class="l l7" x="24" y="246"><tspan class="k">   "location"</tspan><tspan class="c">:</tspan> <tspan class="y">"Lahore, PK"</tspan><tspan class="c">,  </tspan><tspan class="k">"open_to"</tspan><tspan class="c">:</tspan> <tspan class="y">"AI collaborations"</tspan></text>
    <text class="l l8" x="24" y="272"><tspan class="c">}</tspan></text>

    <text class="l l8" x="24" y="300"><tspan class="p">➜</tspan> <tspan class="c">~</tspan> <tspan class="g">build:</tspan> <tspan class="v">passing</tspan> <tspan class="c">✓</tspan><tspan class="cur" fill="#5B8CFF"> ▌</tspan></text>
  </g>
</svg>
