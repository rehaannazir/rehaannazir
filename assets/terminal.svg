<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 330" width="900" height="330" fill="none" role="img" aria-label="Live status terminal">
  <defs>
    <style>
      .win{font:600 12px 'Segoe UI',Helvetica,Arial,sans-serif;fill:#5A5468}
      .m{font:400 15px ui-monospace,'Cascadia Code',Consolas,monospace}
      .p{fill:#A855F7}.c{fill:#4A4458}.k{fill:#C084FC}.v{fill:#CFCAD8}.a{fill:#E9D5FF}
      @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
      .l{opacity:0;animation:rise .35s ease forwards}
      .l1{animation-delay:.3s}.l2{animation-delay:.75s}.l3{animation-delay:1.2s}.l4{animation-delay:1.6s}
      .l5{animation-delay:2s}.l6{animation-delay:2.4s}.l7{animation-delay:2.8s}.l8{animation-delay:3.2s}.l9{animation-delay:3.6s}
      @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
      .cur{animation:blink 1s step-end infinite;animation-delay:3.9s;opacity:0}
      @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
      .live{animation:pulse 1.6s ease-in-out infinite}
    </style>
  </defs>

  <rect x="1" y="1" width="898" height="328" rx="16" fill="#000000" stroke="#17141C"/>
  <path d="M1 17 a16 16 0 0 1 16 -16 H883 a16 16 0 0 1 16 16 V44 H1 Z" fill="#0A080D"/>
  <line x1="1" y1="44" x2="899" y2="44" stroke="#17141C"/>
  <circle cx="26" cy="22" r="5.5" fill="#2A2233"/><circle cx="47" cy="22" r="5.5" fill="#3A2E48"/><circle cx="68" cy="22" r="5.5" fill="#A855F7"/>
  <text x="450" y="27" text-anchor="middle" class="win">rehan@nyvexa: ~/systems</text>
  <g class="live" transform="translate(792,15)"><circle cx="7" cy="7" r="4.5" fill="#A855F7"/><text x="18" y="11" class="win" fill="#A855F7">LIVE</text></g>

  <g class="m">
    <text class="l l1" x="24" y="80"><tspan class="p">➜</tspan> <tspan class="c">~</tspan> <tspan class="v">whoami</tspan></text>
    <text class="l l2" x="24" y="104"><tspan class="a">rehan_nazir</tspan> <tspan class="c">// AI Production Systems Engineer</tspan></text>

    <text class="l l3" x="24" y="136"><tspan class="p">➜</tspan> <tspan class="c">~</tspan> <tspan class="v">cat profile.json</tspan></text>
    <text class="l l4" x="24" y="160"><tspan class="c">{</tspan></text>
    <text class="l l5" x="24" y="184"><tspan class="k">   "role"</tspan><tspan class="c">:</tspan> <tspan class="v">"AI Production Systems Engineer"</tspan><tspan class="c">,</tspan></text>
    <text class="l l6" x="24" y="208"><tspan class="k">   "education"</tspan><tspan class="c">:</tspan> <tspan class="v">"3rd-Year Data Science Student"</tspan><tspan class="c">,</tspan></text>
    <text class="l l7" x="24" y="232"><tspan class="k">   "building"</tspan><tspan class="c">:</tspan> <tspan class="v">"Nyvexa — autonomous AI agents"</tspan><tspan class="c">,</tspan></text>
    <text class="l l8" x="24" y="256"><tspan class="k">   "learning"</tspan><tspan class="c">:</tspan> <tspan class="v">"LangGraph · MLOps · Distributed Systems"</tspan><tspan class="c">,</tspan></text>
    <text class="l l8" x="24" y="280"><tspan class="k">   "location"</tspan><tspan class="c">:</tspan> <tspan class="v">"Lahore, PK"</tspan><tspan class="c">,  </tspan><tspan class="k">"open_to"</tspan><tspan class="c">:</tspan> <tspan class="v">"AI collaborations"</tspan></text>
    <text class="l l9" x="24" y="304"><tspan class="c">}</tspan> <tspan class="c">  build:</tspan> <tspan class="p">passing ✓</tspan><tspan class="cur" fill="#A855F7"> ▌</tspan></text>
  </g>
</svg>
