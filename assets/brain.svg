<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" width="900" height="360" fill="none" role="img" aria-label="Neural circuit brain">
  <defs>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#C084FC"/><stop offset="0.5" stop-color="#7C3AED"/><stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="amb" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7C3AED" stop-opacity="0.22"/><stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <style>
      .edge{stroke:#2E2440;stroke-width:1}
      .live{stroke:#A855F7;stroke-width:1.3;stroke-dasharray:4 10}
      @keyframes flow{to{stroke-dashoffset:-56}}
      .live{animation:flow 2s linear infinite}
      .node{fill:#050507;stroke:#7E5AA8;stroke-width:1.3}
      @keyframes pn{0%,100%{r:3.2;stroke:#7E5AA8}50%{r:5;stroke:#C084FC}}
      .pn{animation:pn 3s ease-in-out infinite}
      .lbl{font:600 11px ui-monospace,Consolas,monospace;fill:#6E6480;letter-spacing:2px}
      @keyframes cp{0%,100%{opacity:.85;r:16}50%{opacity:1;r:22}}
      .cglow{animation:cp 3.4s ease-in-out infinite}
    </style>
  </defs>

  <rect x="1" y="1" width="898" height="358" rx="18" fill="#000000" stroke="#17141C"/>
  <ellipse cx="450" cy="180" rx="300" ry="170" fill="url(#amb)"/>

  <!-- brain silhouette outline -->
  <path d="M300 262 C245 262 205 232 202 186 C160 178 162 120 205 112 C198 78 240 56 278 70 C286 44 330 36 360 54 C392 34 446 40 462 72 L462 250 C440 270 402 268 384 250 C360 272 322 274 300 262 Z"
        stroke="#241C33" stroke-width="1.5" fill="none" opacity="0.9"/>
  <path d="M600 262 C655 262 695 232 698 186 C740 178 738 120 695 112 C702 78 660 56 622 70 C614 44 570 36 540 54 C508 34 454 40 462 72 L462 250 C480 272 498 268 516 250 C540 272 578 274 600 262 Z"
        stroke="#241C33" stroke-width="1.5" fill="none" opacity="0.9"/>

  <!-- synapse edges (static faint) -->
  <g class="edge">
    <path d="M462 90 L360 110 L300 150 L262 200 M300 150 L360 190 L462 175 M360 110 L262 130 M262 200 L330 240 M462 175 L380 235"/>
    <path d="M462 90 L560 110 L620 150 L660 200 M620 150 L560 190 L462 175 M560 110 L660 130 M660 200 L592 240 M462 175 L540 235"/>
    <path d="M462 90 L462 175"/>
  </g>
  <!-- signal flow overlay -->
  <g class="live" fill="none">
    <path d="M462 90 L360 110 L300 150 L262 200"/>
    <path d="M300 150 L360 190 L462 175"/>
    <path d="M462 90 L560 110 L620 150 L660 200"/>
    <path d="M560 190 L462 175"/>
    <path d="M462 175 L540 235"/>
    <path d="M462 175 L380 235"/>
  </g>

  <!-- traveling data pulses -->
  <g fill="#E9D5FF">
    <circle r="3"><animateMotion dur="3s" repeatCount="indefinite" path="M462 90 L360 110 L300 150 L262 200"/></circle>
    <circle r="3"><animateMotion dur="3s" begin="0.6s" repeatCount="indefinite" path="M462 90 L560 110 L620 150 L660 200"/></circle>
    <circle r="2.5" opacity="0.8"><animateMotion dur="2.6s" begin="1.1s" repeatCount="indefinite" path="M462 175 L540 235"/></circle>
    <circle r="2.5" opacity="0.8"><animateMotion dur="2.6s" begin="1.6s" repeatCount="indefinite" path="M462 175 L380 235"/></circle>
  </g>

  <!-- nodes -->
  <g class="node">
    <circle class="pn" cx="360" cy="110" r="3.2"/><circle cx="300" cy="150" r="3.2"/>
    <circle class="pn" cx="262" cy="200" r="3.2"/><circle cx="360" cy="190" r="3.2"/>
    <circle cx="262" cy="130" r="3.2"/><circle class="pn" cx="330" cy="240" r="3.2"/>
    <circle cx="380" cy="235" r="3.2"/>
    <circle class="pn" cx="560" cy="110" r="3.2"/><circle cx="620" cy="150" r="3.2"/>
    <circle class="pn" cx="660" cy="200" r="3.2"/><circle cx="560" cy="190" r="3.2"/>
    <circle cx="660" cy="130" r="3.2"/><circle class="pn" cx="592" cy="240" r="3.2"/>
    <circle cx="540" cy="235" r="3.2"/>
  </g>

  <!-- central core -->
  <circle cx="462" cy="150" r="34" fill="url(#core)" class="cglow"/>
  <circle cx="462" cy="150" r="7" fill="#F3E8FF"/>
  <circle cx="462" cy="150" r="7" fill="none" stroke="#C084FC">
    <animate attributeName="r" values="7;30;7" dur="3.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0;0.9" dur="3.4s" repeatCount="indefinite"/>
  </circle>

  <text x="450" y="330" text-anchor="middle" class="lbl">AUTONOMOUS &#160;·&#160; RELIABLE &#160;·&#160; PRODUCTION-GRADE</text>
</svg>
