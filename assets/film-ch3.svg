<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 800" width="1920" height="800" fill="none" role="img" aria-label="Chapter 3 — Knowledge: documents become a galaxy of meaning">
  <defs>
    <radialGradient id="vig" cx="0.5" cy="0.5" r="0.72">
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/><stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="fogCyan" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#155E6B" stop-opacity="0.07"/><stop offset="1" stop-color="#155E6B" stop-opacity="0"/></radialGradient>
    <radialGradient id="fogViolet" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#4C3B7A" stop-opacity="0.05"/><stop offset="1" stop-color="#4C3B7A" stop-opacity="0"/></radialGradient>
    <linearGradient id="gateG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7FE3F2" stop-opacity="0"/><stop offset="0.5" stop-color="#C9F6FF" stop-opacity="0.9"/><stop offset="1" stop-color="#7FE3F2" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="gateGlow" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#2FB8CE" stop-opacity="0.18"/><stop offset="1" stop-color="#2FB8CE" stop-opacity="0"/></radialGradient>
    <radialGradient id="galaxyGlow" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#1B7C8C" stop-opacity="0.16"/><stop offset="1" stop-color="#1B7C8C" stop-opacity="0"/></radialGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" result="n"/><feColorMatrix in="n" type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.032"/></feComponentTransfer></filter>
    <filter id="blurFar" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="blurFg" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7"/></filter>

    <style>
      .cap{font:600 21px ui-monospace,Consolas,monospace;fill:#F1EDFB;letter-spacing:5px}
      .slate{font:600 11px ui-monospace,Consolas,monospace;fill:#A29BC0;letter-spacing:4px}
      .clbl{font:600 11px ui-monospace,Consolas,monospace;fill:#8FD4E4;letter-spacing:3px}
      .dlbl{font:600 12px ui-monospace,Consolas,monospace;fill:#B9E8F2;letter-spacing:2px}

      @keyframes worldBreathe{0%,100%{transform:scale(1)}50%{transform:scale(1.022)}}
      .world{transform-origin:960px 400px;animation:worldBreathe 16s ease-in-out infinite}

      @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
      .bob{animation:bob 7s ease-in-out infinite}
      .bobB{animation:bob 8.6s ease-in-out infinite -3s}
      .bobC{animation:bob 9.8s ease-in-out infinite -5s}

      /* shard: peel from the document, travel to the gate, transmute */
      @keyframes shard{
        0%{transform:translate(0,0) rotate(0deg) scale(0.5);opacity:0}
        10%{opacity:0.95;transform:translate(60px,8px) rotate(9deg) scale(1)}
        54%{opacity:0.95}
        57%{transform:translate(490px,100px) rotate(38deg) scale(0.7);opacity:0}
        100%{transform:translate(490px,100px) rotate(38deg) scale(0.7);opacity:0}
      }
      .shard{animation:shard 4s cubic-bezier(0.4,0.1,0.6,0.9) infinite}
      @keyframes born{
        0%,55%{transform:scale(0.2);opacity:0}
        58%{opacity:0.95}
        68%{transform:scale(2.4);opacity:0}
        100%{transform:scale(0.2);opacity:0}
      }
      .born{animation:born 4s ease-out infinite}
      .s0{animation-delay:0s}.s1{animation-delay:-1s}.s2{animation-delay:-2s}.s3{animation-delay:-3s}

      @keyframes gateBreathe{0%,100%{opacity:0.4}50%{opacity:0.8}}
      .gateB{animation:gateBreathe 3.4s ease-in-out infinite}
      @keyframes gateGlint{0%{transform:translateY(0);opacity:0}15%{opacity:0.9}55%{opacity:0.9}70%,100%{transform:translateY(270px);opacity:0}}
      .gateGlint{animation:gateGlint 4s ease-in-out infinite}

      @keyframes galaxySway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
      .galaxy{transform-origin:1430px 395px;animation:galaxySway 26s ease-in-out infinite}
      @keyframes gtw{0%,100%{opacity:0.45}50%{opacity:1}}
      .g1{animation:gtw 3.2s ease-in-out infinite}
      .g2{animation:gtw 4.4s ease-in-out infinite -1.2s}
      .g3{animation:gtw 5.4s ease-in-out infinite -2.6s}

      @keyframes crawl{to{stroke-dashoffset:-96}}
      .feed{stroke-dasharray:4 9;animation:crawl 2s linear infinite}

      @keyframes tw{0%,100%{opacity:0.14}50%{opacity:0.6}}
      .tw1{animation:tw 3.6s ease-in-out infinite}
      .tw2{animation:tw 4.9s ease-in-out infinite 1.1s}
      .tw3{animation:tw 6.1s ease-in-out infinite 2.3s}
      @keyframes fogDrift{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,-24px)}}
      .fogDrift{animation:fogDrift 24s ease-in-out infinite}
      @keyframes fogDrift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-64px,28px)}}
      .fogDrift2{animation:fogDrift2 28s ease-in-out infinite}
      @keyframes fgSweep{0%{transform:translate(-420px,-260px);opacity:0}18%{opacity:0.18}55%{opacity:0.18}100%{transform:translate(760px,470px);opacity:0}}
      .fgSweep{animation:fgSweep 8s cubic-bezier(0.3,0.1,0.6,0.9) infinite}

      @keyframes cap{0%,20%{opacity:0}27%,58%{opacity:1}66%,100%{opacity:0}}
      .capA{animation:cap 16s linear infinite}
    </style>
  </defs>

  <!-- ============ STAGE ============ -->
  <rect width="1920" height="800" fill="#050505"/>
  <g class="fogDrift"><ellipse cx="1400" cy="380" rx="840" ry="380" fill="url(#fogCyan)"/></g>
  <g class="fogDrift2"><ellipse cx="380" cy="300" rx="700" ry="340" fill="url(#fogViolet)"/></g>

  <g class="world">
    <!-- ambient stars -->
    <g fill="#6E67A0">
      <circle class="tw1" cx="240" cy="720" r="1.5"/><circle class="tw2" cx="820" cy="110" r="1.4"/>
      <circle class="tw3" cx="1100" cy="700" r="1.5"/><circle class="tw1" cx="1840" cy="140" r="1.5"/>
      <circle class="tw2" cx="620" cy="640" r="1.4"/>
    </g>

    <!-- ============ THE LIBRARY · far monoliths ============ -->
    <g filter="url(#blurFar)" stroke="#153A42" opacity="0.75">
      <g class="bobB"><rect x="90" y="120" width="130" height="180" rx="10" fill="#04080A" stroke-width="2.5"/><path d="M115 165 h80 M115 195 h80 M115 225 h54" stroke-width="2.5"/></g>
      <g class="bobC"><rect x="340" y="480" width="120" height="160" rx="10" fill="#04080A" stroke-width="2.5"/><path d="M362 520 h76 M362 548 h76 M362 576 h50" stroke-width="2.5"/></g>
    </g>

    <!-- near monoliths -->
    <g class="bob">
      <rect x="150" y="230" width="210" height="270" rx="14" fill="#050B0D" stroke="#1E5560" stroke-width="2.5"/>
      <path d="M190 292 h130 M190 330 h130 M190 368 h96 M190 406 h130 M190 444 h74" stroke="#164750" stroke-width="3"/>
      <text x="255" y="270" text-anchor="middle" class="dlbl">PDF · SQL</text>
    </g>
    <g class="bobC">
      <rect x="430" y="150" width="150" height="200" rx="12" fill="#050B0D" stroke="#1B4E58" stroke-width="2.5"/>
      <path d="M458 200 h94 M458 232 h94 M458 264 h64" stroke="#143F48" stroke-width="3"/>
      <text x="505" y="182" text-anchor="middle" class="dlbl" font-size="11">NOTION · DRIVE</text>
    </g>

    <!-- ============ CHUNKING · shards peel toward the gate ============ -->
    <g stroke="#2E8A9C" fill="#07161B">
      <g transform="translate(370,300)"><rect class="shard s0" x="-13" y="-9" width="26" height="18" rx="3" stroke-width="1.6"/></g>
      <g transform="translate(370,340)"><rect class="shard s1" x="-13" y="-9" width="26" height="18" rx="3" stroke-width="1.6"/></g>
      <g transform="translate(370,380)"><rect class="shard s2" x="-13" y="-9" width="26" height="18" rx="3" stroke-width="1.6"/></g>
      <g transform="translate(370,420)"><rect class="shard s3" x="-13" y="-9" width="26" height="18" rx="3" stroke-width="1.6"/></g>
    </g>

    <!-- ============ THE EMBEDDING GATE ============ -->
    <ellipse class="gateB" cx="880" cy="410" rx="34" ry="190" fill="url(#gateGlow)"/>
    <line x1="880" y1="250" x2="880" y2="570" stroke="url(#gateG)" stroke-width="2.2"/>
    <g class="gateGlint"><line x1="880" y1="270" x2="880" y2="330" stroke="#EAFBFF" stroke-width="2.6" stroke-linecap="round" opacity="0.9"/></g>
    <text x="880" y="228" text-anchor="middle" class="clbl">EMBEDDING</text>

    <!-- star-birth flashes at the gate -->
    <g fill="none" stroke="#C9F6FF" stroke-width="2">
      <g transform="translate(880,400)"><circle class="born s0" r="10"/></g>
      <g transform="translate(880,440)"><circle class="born s1" r="10"/></g>
      <g transform="translate(880,480)"><circle class="born s2" r="10"/></g>
      <g transform="translate(880,520)"><circle class="born s3" r="10"/></g>
    </g>
    <!-- newborn stars drifting into the galaxy -->
    <g fill="#9FEAF6">
      <circle r="2.6"><animateMotion dur="4s" begin="-1.7s" repeatCount="indefinite" calcMode="linear" keyPoints="0;0;1;1" keyTimes="0;0.57;0.95;1" path="M880 400 C 1060 380 1220 390 1359 402"/><animate attributeName="opacity" values="0;0;0.9;0.9;0" keyTimes="0;0.57;0.62;0.92;1" dur="4s" begin="-1.7s" repeatCount="indefinite"/></circle>
      <circle r="2.6"><animateMotion dur="4s" begin="-3.7s" repeatCount="indefinite" calcMode="linear" keyPoints="0;0;1;1" keyTimes="0;0.57;0.95;1" path="M880 480 C 1070 490 1260 510 1439 516"/><animate attributeName="opacity" values="0;0;0.9;0.9;0" keyTimes="0;0.57;0.62;0.92;1" dur="4s" begin="-3.7s" repeatCount="indefinite"/></circle>
    </g>

    <!-- ============ THE VECTOR DATABASE · cylinder with spiral memory ============ -->
    <ellipse cx="1430" cy="395" rx="330" ry="260" fill="url(#galaxyGlow)"/>
    <g stroke="#1E5560" stroke-width="2">
      <path d="M1190 210 V560 A240 55 0 0 0 1670 560 V210" fill="#06262C" fill-opacity="0.16"/>
      <ellipse cx="1430" cy="335" rx="240" ry="55" fill="none" opacity="0.18"/>
      <ellipse cx="1430" cy="460" rx="240" ry="55" fill="none" opacity="0.18"/>
      <ellipse cx="1430" cy="210" rx="240" ry="55" fill="#04181C" fill-opacity="0.5"/>
    </g>
    <g class="galaxy">
      <!-- spiral arm -->
      <path d="M1442 395 L1450 405 L1443 419 L1419 429 L1386 424 L1359 402 L1355 368 L1383 335 L1439 318 L1506 328 L1557 368 L1567 427 L1525 484 L1439 516 L1336 506 L1255 452 L1229 369"
            stroke="#10333B" stroke-width="1.2" fill="none"/>
      <!-- neural cross-links -->
      <g stroke="#0E2A31" stroke-width="1">
        <path d="M1443 419 L1383 335 M1386 424 L1439 318 M1506 328 L1567 427 M1359 402 L1255 452 M1525 484 L1336 506"/>
      </g>
      <g fill="#67D8E8">
        <circle class="g1" cx="1442" cy="395" r="2"/><circle class="g2" cx="1450" cy="405" r="2"/>
        <circle class="g3" cx="1443" cy="419" r="2.2"/><circle class="g1" cx="1419" cy="429" r="2"/>
        <circle class="g2" cx="1386" cy="424" r="2.2"/><circle class="g3" cx="1359" cy="402" r="2.4"/>
        <circle class="g1" cx="1355" cy="368" r="2.2"/><circle class="g2" cx="1383" cy="335" r="2.4"/>
        <circle class="g3" cx="1439" cy="318" r="2.8"/><circle class="g1" cx="1506" cy="328" r="2.4"/>
        <circle class="g2" cx="1557" cy="368" r="2.8"/><circle class="g3" cx="1567" cy="427" r="2.4"/>
        <circle class="g1" cx="1525" cy="484" r="2.8"/><circle class="g2" cx="1439" cy="516" r="2.6"/>
        <circle class="g3" cx="1336" cy="506" r="2.4"/><circle class="g1" cx="1255" cy="452" r="2.2"/>
        <circle class="g2" cx="1229" cy="369" r="2.2"/>
      </g>
    </g>
    <text x="1430" y="690" text-anchor="middle" class="clbl">VECTOR DATABASE · SIMILARITY SEARCH</text>

    <!-- ============ THE QUERY · context strand from Ch.2 ============ -->
    <path class="feed" d="M-20 620 C 400 610 900 560 1430 390" stroke="#3E6FB8" stroke-width="1.8" opacity="0.4"/>
    <circle r="5" fill="#7FB3FF">
      <animateMotion dur="8s" begin="0s" repeatCount="indefinite" calcMode="linear" keyPoints="0;1;1" keyTimes="0;0.25;1" path="M-20 620 C 400 610 900 560 1430 390"/>
      <animate attributeName="opacity" values="0.95;0.95;0;0" keyTimes="0;0.25;0.42;1" dur="8s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <!-- radar sweep · elliptical wave inside the cylinder -->
    <ellipse cx="1430" cy="395" rx="12" ry="8" fill="none" stroke="#7FE3F2" stroke-width="1.6">
      <animate attributeName="rx" values="12;12;225;225" keyTimes="0;0.25;0.52;1" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="8;8;150;150" keyTimes="0;0.25;0.52;1" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.85;0;0" keyTimes="0;0.25;0.52;1" dur="8s" repeatCount="indefinite"/>
    </ellipse>
    <!-- nearest neighbors ignite along the spiral -->
    <g fill="#F2FDFF">
      <circle cx="1439" cy="318" r="4.6"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.4;0.46;0.72;0.82;1" dur="8s" repeatCount="indefinite"/></circle>
      <circle cx="1557" cy="368" r="4.2"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.42;0.48;0.72;0.82;1" dur="8s" repeatCount="indefinite"/></circle>
      <circle cx="1525" cy="484" r="4.6"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.44;0.5;0.72;0.82;1" dur="8s" repeatCount="indefinite"/></circle>
      <circle cx="1336" cy="506" r="4"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.46;0.52;0.72;0.82;1" dur="8s" repeatCount="indefinite"/></circle>
    </g>
    <g stroke="#BFF3FB" stroke-width="1.4">
      <path d="M1430 395 L1439 318"><animate attributeName="opacity" values="0;0;0.9;0.9;0;0" keyTimes="0;0.46;0.52;0.7;0.8;1" dur="8s" repeatCount="indefinite"/></path>
      <path d="M1430 395 L1557 368"><animate attributeName="opacity" values="0;0;0.9;0.9;0;0" keyTimes="0;0.47;0.53;0.7;0.8;1" dur="8s" repeatCount="indefinite"/></path>
      <path d="M1430 395 L1525 484"><animate attributeName="opacity" values="0;0;0.9;0.9;0;0" keyTimes="0;0.48;0.54;0.7;0.8;1" dur="8s" repeatCount="indefinite"/></path>
      <path d="M1430 395 L1336 506"><animate attributeName="opacity" values="0;0;0.9;0.9;0;0" keyTimes="0;0.49;0.55;0.7;0.8;1" dur="8s" repeatCount="indefinite"/></path>
    </g>
    <!-- retrieved knowledge exits toward Ch.4 -->
    <circle r="5.5" fill="#D9FAFF">
      <animateMotion dur="8s" begin="0s" repeatCount="indefinite" calcMode="linear" keyPoints="0;0;1;1" keyTimes="0;0.62;0.88;1" path="M1430 390 C 1650 400 1800 420 1990 430"/>
      <animate attributeName="opacity" values="0;0;0.95;0.95;0" keyTimes="0;0.62;0.66;0.86;1" dur="8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- foreground defocus pass -->
  <g class="fgSweep" filter="url(#blurFg)"><line x1="300" y1="100" x2="520" y2="330" stroke="#2E7A8C" stroke-width="26" stroke-linecap="round" opacity="0.5"/></g>

  <rect width="1920" height="800" fill="url(#vig)"/>
  <rect width="1920" height="800" filter="url(#grain)" opacity="0.5"/>

  <!-- ============ TITLES · above the grade ============ -->
  <text x="960" y="740" text-anchor="middle" class="cap capA">meaning becomes math.</text>
  <text x="66" y="66" class="slate" opacity="0.9">CH 03 · KNOWLEDGE</text>
</svg>
