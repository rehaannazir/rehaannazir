<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 195" width="480" height="195" fill="none" role="img" aria-label="Most used languages for rehaannazir">
  <defs>
    <style>
      .ttl{font:700 13px 'Segoe UI',Helvetica,Arial,sans-serif;fill:#EDEDF2;letter-spacing:2px}
      .sub{font:500 10px ui-monospace,Consolas,monospace;fill:#5A5468}
      .lg{font:600 12px 'Segoe UI',Helvetica,Arial,sans-serif;fill:#D7D2E0}
      .pc{font:700 12px ui-monospace,Consolas,monospace;fill:#8A8698}
      @keyframes spin{from{transform:rotate(-90deg)}to{transform:rotate(270deg)}}
      .donut{animation:spin 40s linear infinite;transform-origin:90px 100px}
      @keyframes pop{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
      .row{opacity:0;animation:pop .4s ease forwards}
    </style>
  </defs>
  <rect x="1" y="1" width="478" height="193" rx="14" fill="#000000" stroke="#17141C"/>

  <circle cx="22" cy="24" r="3" fill="#A855F7"/>
  <text x="32" y="28" class="ttl">TOP LANGUAGES</text>
  <text x="458" y="28" text-anchor="end" class="sub">@rehaannazir</text>
  <line x1="20" y1="38" x2="460" y2="38" stroke="#17141C"/>

  <!-- donut: real byte-share across non-fork repos — widened violet/indigo/magenta
       palette + small gaps between arcs so slices stay distinguishable -->
  <g class="donut">
    <circle cx="90" cy="100" r="54" fill="none" stroke="#A855F7" stroke-width="16" stroke-dasharray="233.6 105.7" stroke-dashoffset="0"/>
    <circle cx="90" cy="100" r="54" fill="none" stroke="#4C1D95" stroke-width="16" stroke-dasharray="35.0 304.3" stroke-dashoffset="-237.6"/>
    <circle cx="90" cy="100" r="54" fill="none" stroke="#F0ABFC" stroke-width="16" stroke-dasharray="25.2 314.1" stroke-dashoffset="-276.6"/>
    <circle cx="90" cy="100" r="54" fill="none" stroke="#818CF8" stroke-width="16" stroke-dasharray="8.2 331.1" stroke-dashoffset="-305.8"/>
    <circle cx="90" cy="100" r="54" fill="none" stroke="#F5D0FE" stroke-width="16" stroke-dasharray="8.2 331.1" stroke-dashoffset="-318.0"/>
    <circle cx="90" cy="100" r="54" fill="none" stroke="#6D28D9" stroke-width="16" stroke-dasharray="5.0 334.3" stroke-dashoffset="-330.2"/>
  </g>
  <circle cx="90" cy="100" r="38" fill="#000000"/>
  <text x="90" y="97" text-anchor="middle" class="pc" font-size="15" fill="#E9D5FF">6</text>
  <text x="90" y="112" text-anchor="middle" class="sub">LANGS</text>

  <!-- legend -->
  <g>
    <g class="row" style="animation-delay:.1s"><circle cx="196" cy="52" r="5" fill="#A855F7"/><text x="210" y="56" class="lg">Jupyter Notebook</text><text x="458" y="56" text-anchor="end" class="pc">74.1%</text></g>
    <g class="row" style="animation-delay:.2s"><circle cx="196" cy="76" r="5" fill="#4C1D95"/><text x="210" y="80" class="lg">JavaScript</text><text x="458" y="80" text-anchor="end" class="pc">11.1%</text></g>
    <g class="row" style="animation-delay:.3s"><circle cx="196" cy="100" r="5" fill="#F0ABFC"/><text x="210" y="104" class="lg">Python</text><text x="458" y="104" text-anchor="end" class="pc">8.0%</text></g>
    <g class="row" style="animation-delay:.4s"><circle cx="196" cy="124" r="5" fill="#818CF8"/><text x="210" y="128" class="lg">TypeScript</text><text x="458" y="128" text-anchor="end" class="pc">2.6%</text></g>
    <g class="row" style="animation-delay:.5s"><circle cx="196" cy="148" r="5" fill="#F5D0FE"/><text x="210" y="152" class="lg">HTML</text><text x="458" y="152" text-anchor="end" class="pc">2.6%</text></g>
    <g class="row" style="animation-delay:.6s"><circle cx="196" cy="172" r="5" fill="#6D28D9"/><text x="210" y="176" class="lg">CSS</text><text x="458" y="176" text-anchor="end" class="pc">1.6%</text></g>
  </g>
</svg>
