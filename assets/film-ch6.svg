<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 800" width="1920" height="800" fill="none" role="img" aria-label="Chapter 6 — Automation: capsules ride glowing rails to tools; retries and fallbacks, no humans woken">
  <defs>
    <radialGradient id="vig" cx="0.5" cy="0.5" r="0.72">
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/><stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="fogOrange" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#7A4520" stop-opacity="0.06"/><stop offset="1" stop-color="#7A4520" stop-opacity="0"/></radialGradient>
    <radialGradient id="fogViolet" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#4C3B7A" stop-opacity="0.05"/><stop offset="1" stop-color="#4C3B7A" stop-opacity="0"/></radialGradient>
    <radialGradient id="inGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#C4B5FD" stop-opacity="0.7"/><stop offset="0.45" stop-color="#8B5CF6" stop-opacity="0.28"/><stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hubGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFD0A8" stop-opacity="0.6"/><stop offset="0.45" stop-color="#FB923C" stop-opacity="0.25"/><stop offset="1" stop-color="#FB923C" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" result="n"/><feColorMatrix in="n" type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.032"/></feComponentTransfer></filter>
    <filter id="blurFar" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="blurFg" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7"/></filter>

    <!-- humanoid dispatcher robot · talking, wandering eyes, antenna ears -->
    <g id="bot6">
      <path d="M-20 -12 Q-30 -4 -29 8 M20 -12 Q30 -4 29 8" stroke="currentColor" stroke-width="5.5" stroke-linecap="round" fill="none"/>
      <rect x="-20" y="-20" width="40" height="34" rx="11" fill="#0C0B12" stroke="currentColor" stroke-width="1.8"/>
      <circle cx="0" cy="-4" r="6" fill="none" stroke="currentColor" stroke-width="1.4" opacity="0.8"/>
      <circle class="core" cx="0" cy="-4" r="2.4" fill="#F4F1FB"/>
      <rect x="-5" y="-26" width="10" height="7" rx="3" fill="#0C0B12" stroke="currentColor" stroke-width="1.4"/>
      <rect x="-17" y="-58" width="34" height="33" rx="12" fill="#0C0B12" stroke="currentColor" stroke-width="1.8"/>
      <rect x="-12" y="-53" width="24" height="23" rx="8" fill="#12101A"/>
      <path d="M-17 -48 L-25 -56 M17 -48 L25 -56" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <circle class="tip" cx="-25" cy="-56" r="2.3" fill="currentColor"/><circle class="tip" cx="25" cy="-56" r="2.3" fill="currentColor"/>
      <circle cx="-7" cy="-44" r="4" fill="#08070C"/><circle cx="7" cy="-44" r="4" fill="#08070C"/>
      <circle cy="-44" r="2.4" fill="#EDE9F8"><animate attributeName="cx" values="-9;-5;-9" dur="3.1s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;1;0.1;1" keyTimes="0;0.9;0.94;1" dur="4.3s" repeatCount="indefinite"/></circle>
      <circle cy="-44" r="2.4" fill="#EDE9F8"><animate attributeName="cx" values="5;9;5" dur="3.1s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;1;0.1;1" keyTimes="0;0.9;0.94;1" dur="4.3s" repeatCount="indefinite"/></circle>
      <rect class="mouth" x="-5.5" y="-34" width="11" height="3" rx="1.5" fill="#CFC6EE"/>
    </g>

    <!-- hand-drawn tool marks in signature colors -->
    <g id="lgSlack">
      <rect x="-2" y="-11" width="5" height="10" rx="2.5" fill="#36C5F0"/>
      <rect x="1" y="-3" width="10" height="5" rx="2.5" fill="#2EB67D"/>
      <rect x="-3" y="1" width="5" height="10" rx="2.5" fill="#ECB22E"/>
      <rect x="-11" y="-2" width="10" height="5" rx="2.5" fill="#E01E5A"/>
    </g>
    <g id="lgGmail">
      <rect x="-10" y="-7.5" width="20" height="15" rx="2" fill="#FBF7F4"/>
      <path d="M-10 -6 L0 2 L10 -6" stroke="#EA4335" stroke-width="2.6" fill="none" stroke-linejoin="round"/>
      <rect x="-10" y="-7.5" width="2.6" height="15" rx="1.3" fill="#4285F4"/>
      <rect x="7.4" y="-7.5" width="2.6" height="15" rx="1.3" fill="#34A853"/>
    </g>
    <g id="lgGithub">
      <circle r="10" fill="#F0F6FC"/>
      <path d="M-6.5 1 q0 -4 2.6 -5.8 l-0.7 -3.4 2.8 1.8 q1.8 -0.5 3.6 0 l2.8 -1.8 -0.7 3.4 q2.6 1.8 2.6 5.8 q0 4.6 -6.5 4.6 q-6.5 0 -6.5 -4.6 Z" fill="#0D1117"/>
      <circle cx="-2.6" cy="0" r="1" fill="#F0F6FC"/><circle cx="2.6" cy="0" r="1" fill="#F0F6FC"/>
    </g>
    <g id="lgStripe">
      <rect x="-10" y="-10" width="20" height="20" rx="5" fill="#635BFF"/>
      <text y="4.5" text-anchor="middle" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="13" font-weight="800" fill="#FFFFFF">S</text>
    </g>
    <g id="lgSheets">
      <rect x="-8" y="-10" width="16" height="20" rx="2.5" fill="#188038"/>
      <rect x="-5" y="-3" width="10" height="9" fill="none" stroke="#FFFFFF" stroke-width="1.3"/>
      <path d="M-5 0 h10 M-5 3 h10 M-1.6 -3 v9" stroke="#FFFFFF" stroke-width="1.1"/>
    </g>
    <g id="lgCrm">
      <rect x="-10" y="-8" width="20" height="16" rx="3" fill="#0E1626" stroke="#60A5FA" stroke-width="1.4"/>
      <circle cx="-4.5" cy="-2" r="2.4" fill="#60A5FA"/>
      <path d="M-8 5 q3.5 -4.5 7 0" fill="#60A5FA"/>
      <path d="M2 -3 h6 M2 1 h6 M2 5 h4" stroke="#93C5FD" stroke-width="1.4"/>
    </g>

    <style>
      .cap{font:600 21px ui-monospace,Consolas,monospace;fill:#F1EDFB;letter-spacing:5px}
      .slate{font:600 11px ui-monospace,Consolas,monospace;fill:#A29BC0;letter-spacing:4px}
      .stn{font:600 11px ui-monospace,Consolas,monospace;fill:#D9D3EC;letter-spacing:2px}
      .olbl{font:600 11px ui-monospace,Consolas,monospace;fill:#F0B98C;letter-spacing:3px}
      .plbl{font:600 10px ui-monospace,Consolas,monospace;fill:#A79FCB;letter-spacing:2px}

      @keyframes worldBreathe{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
      .world{transform-origin:960px 400px;animation:worldBreathe 18s ease-in-out infinite}

      @keyframes crawl{to{stroke-dashoffset:-84}}
      .railFlow{stroke:#FB923C;stroke-width:1.3;opacity:0.3;stroke-dasharray:3 9;animation:crawl 1.6s linear infinite}
      .rail{stroke:#241F36;stroke-width:1.5}

      @keyframes hubB{0%,100%{transform:scale(1)}50%{transform:scale(1.14)}}
      .hub{transform-origin:760px 400px;animation:hubB 2.8s ease-in-out infinite}

      /* robot life */
      .mouth{transform-box:fill-box;transform-origin:center;animation:talk 0.5s ease-in-out infinite alternate}
      @keyframes talk{from{transform:scaleY(0.45)}to{transform:scaleY(1.8)}}
      @keyframes corePulse{0%,100%{opacity:1}50%{opacity:0.35}}
      .core{animation:corePulse 2.4s ease-in-out infinite}
      .tip{animation:corePulse 1.7s ease-in-out infinite}

      @keyframes tw{0%,100%{opacity:0.14}50%{opacity:0.6}}
      .tw1{animation:tw 3.6s ease-in-out infinite}
      .tw2{animation:tw 4.9s ease-in-out infinite 1.1s}
      .tw3{animation:tw 6.1s ease-in-out infinite 2.3s}
      @keyframes fogDrift{0%,100%{transform:translate(0,0)}50%{transform:translate(58px,-24px)}}
      .fogDrift{animation:fogDrift 24s ease-in-out infinite}
      @keyframes fogDrift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-56px,26px)}}
      .fogDrift2{animation:fogDrift2 28s ease-in-out infinite}
      @keyframes fgSweep{0%{transform:translate(-420px,-260px);opacity:0}18%{opacity:0.16}55%{opacity:0.16}100%{transform:translate(760px,470px);opacity:0}}
      .fgSweep{animation:fgSweep 9s cubic-bezier(0.3,0.1,0.6,0.9) infinite}

      @keyframes cap{0%,20%{opacity:0}27%,58%{opacity:1}66%,100%{opacity:0}}
      .capA{animation:cap 18s linear infinite}
    </style>
  </defs>

  <!-- ============ STAGE ============ -->
  <rect width="1920" height="800" fill="#050505"/>
  <g class="fogDrift"><ellipse cx="1300" cy="400" rx="860" ry="380" fill="url(#fogOrange)"/></g>
  <g class="fogDrift2"><ellipse cx="360" cy="360" rx="680" ry="340" fill="url(#fogViolet)"/></g>

  <!-- background storm · far parallel rails -->
  <g filter="url(#blurFar)" opacity="0.5">
    <line x1="200" y1="92" x2="1750" y2="92" stroke="#1A1524" stroke-width="1.5"/>
    <line x1="160" y1="716" x2="1760" y2="716" stroke="#1A1524" stroke-width="1.5"/>
    <rect x="0" y="88" width="14" height="7" rx="3.5" fill="#8A5A2E"><animate attributeName="x" values="200;1740" dur="6.5s" repeatCount="indefinite"/></rect>
    <rect x="0" y="712" width="14" height="7" rx="3.5" fill="#8A5A2E"><animate attributeName="x" values="1740;160" dur="8s" repeatCount="indefinite"/></rect>
  </g>

  <g class="world">
    <!-- ambient stars -->
    <g fill="#6E67A0">
      <circle class="tw1" cx="300" cy="180" r="1.5"/><circle class="tw2" cx="1100" cy="120" r="1.4"/>
      <circle class="tw3" cx="1840" cy="360" r="1.5"/><circle class="tw1" cx="240" cy="620" r="1.4"/>
      <circle class="tw2" cx="900" cy="700" r="1.4"/>
    </g>

    <!-- ============ INGRESS · the dispatcher robot ============ -->
    <circle cx="170" cy="396" r="64" fill="url(#inGlow)"/>
    <ellipse cx="170" cy="450" rx="34" ry="6" fill="#0A0810"/>
    <use href="#bot6" color="#A78BFA" transform="translate(170,438)"/>
    <circle cx="170" cy="400" r="12" fill="none" stroke="#C4B5FD"><animate attributeName="r" values="12;48;12" dur="2.25s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.7;0;0.7" dur="2.25s" repeatCount="indefinite"/></circle>
    <text x="170" y="478" text-anchor="middle" class="plbl">FROM AGENTS · TRIGGERS</text>

    <!-- feed to the engine -->
    <line x1="212" y1="400" x2="700" y2="400" class="rail"/>
    <line x1="212" y1="400" x2="700" y2="400" class="railFlow"/>
    <g fill="#A78BFA">
      <circle r="3.5"><animateMotion dur="1.5s" begin="0s" repeatCount="indefinite" path="M212 400 H700"/><animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.12;0.85;1" dur="1.5s" begin="0s" repeatCount="indefinite"/></circle>
      <circle r="3.5"><animateMotion dur="1.5s" begin="-0.75s" repeatCount="indefinite" path="M212 400 H700"/><animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.12;0.85;1" dur="1.5s" begin="-0.75s" repeatCount="indefinite"/></circle>
    </g>

    <!-- ============ THE AUTOMATION ENGINE ============ -->
    <circle cx="760" cy="400" r="64" fill="url(#hubGlow)"/>
    <g class="hub"><path d="M760 372 L788 400 L760 428 L732 400 Z" fill="#0C0A10" stroke="#FB923C" stroke-width="2"/></g>
    <text x="760" y="340" text-anchor="middle" class="olbl">AUTOMATION ENGINE</text>

    <!-- ============ RAILS · connections appear as capsules ride ============ -->
    <g>
      <path class="rail" d="M760 400 C 1000 400 1240 150 1500 150"/><path class="railFlow" d="M760 400 C 1000 400 1240 150 1500 150"/>
      <path class="rail" d="M760 400 C 1000 400 1240 250 1500 250"/><path class="railFlow" d="M760 400 C 1000 400 1240 250 1500 250"/>
      <path class="rail" d="M760 400 C 1000 395 1240 350 1500 350"/><path class="railFlow" d="M760 400 C 1000 395 1240 350 1500 350"/>
      <path class="rail" d="M760 400 C 1000 405 1240 450 1500 450"/><path class="railFlow" d="M760 400 C 1000 405 1240 450 1500 450"/>
      <path class="rail" d="M760 400 C 1000 410 1240 550 1500 550"/><path class="railFlow" d="M760 400 C 1000 410 1240 550 1500 550"/>
      <path class="rail" d="M760 400 C 1000 415 1240 650 1500 650"/><path class="railFlow" d="M760 400 C 1000 415 1240 650 1500 650"/>
    </g>

    <!-- capsules -->
    <g fill="#FB923C">
      <rect x="-8" y="-4" width="16" height="8" rx="4"><animateMotion dur="4.5s" begin="0s" rotate="auto" repeatCount="indefinite" path="M760 400 C 1000 400 1240 150 1500 150"/><animate attributeName="opacity" values="0;0.95;0.95;0" keyTimes="0;0.08;0.9;1" dur="4.5s" begin="0s" repeatCount="indefinite"/></rect>
      <rect x="-8" y="-4" width="16" height="8" rx="4"><animateMotion dur="4.5s" begin="-0.75s" rotate="auto" repeatCount="indefinite" path="M760 400 C 1000 400 1240 250 1500 250"/><animate attributeName="opacity" values="0;0.95;0.95;0" keyTimes="0;0.08;0.9;1" dur="4.5s" begin="-0.75s" repeatCount="indefinite"/></rect>
      <rect x="-8" y="-4" width="16" height="8" rx="4"><animateMotion dur="4.5s" begin="-1.5s" rotate="auto" repeatCount="indefinite" path="M760 400 C 1000 395 1240 350 1500 350"/><animate attributeName="opacity" values="0;0.95;0.95;0" keyTimes="0;0.08;0.9;1" dur="4.5s" begin="-1.5s" repeatCount="indefinite"/></rect>
      <!-- STRIPE rail · fails once, retries, succeeds -->
      <rect x="-8" y="-4" width="16" height="8" rx="4"><animateMotion dur="9s" begin="0s" repeatCount="indefinite" calcMode="linear" keyPoints="0;0.96;0.55;0.96;0.96" keyTimes="0;0.3;0.5;0.78;1" path="M760 400 C 1000 405 1240 450 1500 450"/><animate attributeName="opacity" values="0;0.95;0.95;0.95;0;0" keyTimes="0;0.05;0.78;0.84;0.9;1" dur="9s" begin="0s" repeatCount="indefinite"/></rect>
      <rect x="-8" y="-4" width="16" height="8" rx="4"><animateMotion dur="4.5s" begin="-3s" rotate="auto" repeatCount="indefinite" path="M760 400 C 1000 410 1240 550 1500 550"/><animate attributeName="opacity" values="0;0.95;0.95;0" keyTimes="0;0.08;0.9;1" dur="4.5s" begin="-3s" repeatCount="indefinite"/></rect>
      <rect x="-8" y="-4" width="16" height="8" rx="4"><animateMotion dur="4.5s" begin="-3.75s" rotate="auto" repeatCount="indefinite" path="M760 400 C 1000 415 1240 650 1500 650"/><animate attributeName="opacity" values="0;0.95;0.95;0" keyTimes="0;0.08;0.9;1" dur="4.5s" begin="-3.75s" repeatCount="indefinite"/></rect>
    </g>

    <!-- ============ TOOL STATIONS · real marks in signature colors ============ -->
    <g>
      <rect x="1500" y="130" width="150" height="40" rx="10" fill="#08070C" stroke="#241F36" stroke-width="1.4"/><use href="#lgSlack" transform="translate(1524,150)"/><text x="1596" y="154" text-anchor="middle" class="stn">SLACK</text>
      <rect x="1500" y="230" width="150" height="40" rx="10" fill="#08070C" stroke="#241F36" stroke-width="1.4"/><use href="#lgGmail" transform="translate(1524,250)"/><text x="1596" y="254" text-anchor="middle" class="stn">GMAIL</text>
      <rect x="1500" y="330" width="150" height="40" rx="10" fill="#08070C" stroke="#241F36" stroke-width="1.4"/><use href="#lgGithub" transform="translate(1524,350)"/><text x="1596" y="354" text-anchor="middle" class="stn">GITHUB</text>
      <rect x="1500" y="430" width="150" height="40" rx="10" fill="#08070C" stroke="#241F36" stroke-width="1.4"/><use href="#lgStripe" transform="translate(1524,450)"/><text x="1596" y="454" text-anchor="middle" class="stn">STRIPE</text>
      <rect x="1500" y="530" width="150" height="40" rx="10" fill="#08070C" stroke="#241F36" stroke-width="1.4"/><use href="#lgSheets" transform="translate(1524,550)"/><text x="1596" y="554" text-anchor="middle" class="stn">SHEETS</text>
      <rect x="1500" y="630" width="150" height="40" rx="10" fill="#08070C" stroke="#241F36" stroke-width="1.4"/><use href="#lgCrm" transform="translate(1524,650)"/><text x="1596" y="654" text-anchor="middle" class="stn">CRM</text>
    </g>

    <!-- dock confirmations · green -->
    <g fill="none" stroke="#34D399" stroke-width="2">
      <circle cx="1500" cy="150" r="9"><animate attributeName="r" values="9;9;22" keyTimes="0;0.88;1" dur="4.5s" begin="0s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0;0.85;0" keyTimes="0;0.86;0.92;1" dur="4.5s" begin="0s" repeatCount="indefinite"/></circle>
      <circle cx="1500" cy="250" r="9"><animate attributeName="r" values="9;9;22" keyTimes="0;0.88;1" dur="4.5s" begin="-0.75s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0;0.85;0" keyTimes="0;0.86;0.92;1" dur="4.5s" begin="-0.75s" repeatCount="indefinite"/></circle>
      <circle cx="1500" cy="350" r="9"><animate attributeName="r" values="9;9;22" keyTimes="0;0.88;1" dur="4.5s" begin="-1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0;0.85;0" keyTimes="0;0.86;0.92;1" dur="4.5s" begin="-1.5s" repeatCount="indefinite"/></circle>
      <circle cx="1500" cy="550" r="9"><animate attributeName="r" values="9;9;22" keyTimes="0;0.88;1" dur="4.5s" begin="-3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0;0.85;0" keyTimes="0;0.86;0.92;1" dur="4.5s" begin="-3s" repeatCount="indefinite"/></circle>
      <circle cx="1500" cy="650" r="9"><animate attributeName="r" values="9;9;22" keyTimes="0;0.88;1" dur="4.5s" begin="-3.75s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0;0.85;0" keyTimes="0;0.86;0.92;1" dur="4.5s" begin="-3.75s" repeatCount="indefinite"/></circle>
    </g>

    <!-- STRIPE · red failure then green recovery -->
    <circle cx="1500" cy="450" r="9" fill="none" stroke="#F87171" stroke-width="2">
      <animate attributeName="r" values="9;9;24;24" keyTimes="0;0.29;0.36;1" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0.9;0;0" keyTimes="0;0.29;0.33;0.4;1" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1500" cy="450" r="9" fill="none" stroke="#34D399" stroke-width="2">
      <animate attributeName="r" values="9;9;24;24" keyTimes="0;0.77;0.85;1" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0.9;0;0" keyTimes="0;0.77;0.81;0.89;1" dur="9s" repeatCount="indefinite"/>
    </circle>
    <text x="1200" y="478" text-anchor="middle" class="plbl" fill="#F5A9A9">retrying…<animate attributeName="opacity" values="0;0;0.9;0.9;0;0" keyTimes="0;0.42;0.47;0.62;0.68;1" dur="9s" repeatCount="indefinite"/></text>
  </g>

  <!-- foreground defocus pass -->
  <g class="fgSweep" filter="url(#blurFg)"><line x1="300" y1="100" x2="520" y2="330" stroke="#8A5A2E" stroke-width="26" stroke-linecap="round" opacity="0.5"/></g>

  <rect width="1920" height="800" fill="url(#vig)"/>
  <rect width="1920" height="800" filter="url(#grain)" opacity="0.5"/>

  <!-- ============ TITLES · above the grade ============ -->
  <text x="960" y="744" text-anchor="middle" class="cap capA">retries. fallbacks. no humans woken.</text>
  <text x="66" y="66" class="slate" opacity="0.9">CH 06 · AUTOMATION</text>
</svg>
