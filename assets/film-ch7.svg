<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 800" width="1920" height="800" fill="none" role="img" aria-label="Chapter 7 — Production: containers deploy, health breathes green, business pays in gold">
  <defs>
    <radialGradient id="vig" cx="0.5" cy="0.5" r="0.72">
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/><stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="fogGreen" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#14532D" stop-opacity="0.07"/><stop offset="1" stop-color="#14532D" stop-opacity="0"/></radialGradient>
    <radialGradient id="fogGold" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#713F12" stop-opacity="0.055"/><stop offset="1" stop-color="#713F12" stop-opacity="0"/></radialGradient>
    <radialGradient id="mastGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6EE7B7" stop-opacity="0.7"/><stop offset="0.5" stop-color="#34D399" stop-opacity="0.25"/><stop offset="1" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" result="n"/><feColorMatrix in="n" type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.032"/></feComponentTransfer></filter>
    <filter id="blurFg" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7"/></filter>

    <radialGradient id="dockGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2496ED" stop-opacity="0.4"/><stop offset="1" stop-color="#2496ED" stop-opacity="0"/>
    </radialGradient>
    <!-- glowing docker whale · containers on its back -->
    <g id="docker">
      <circle cy="-2" r="26" fill="url(#dockGlow)"/>
      <g fill="#0A1520" stroke="#2496ED" stroke-width="1.2">
        <rect x="-15" y="-9" width="6" height="6"/><rect x="-8" y="-9" width="6" height="6"/><rect x="-1" y="-9" width="6" height="6"/><rect x="6" y="-9" width="6" height="6"/>
        <rect x="-8" y="-16" width="6" height="6"/><rect x="-1" y="-16" width="6" height="6"/>
        <rect x="-1" y="-23" width="6" height="6"/>
      </g>
      <path d="M-22 -1 H20 q7 0 5.5 5.5 q-3.5 11.5 -20.5 11.5 H-9 q-14 0 -17.5 -10.5 q-6.5 1.5 -9.5 -2.5 q3.5 -4 8.5 -3 z"
            fill="#0A1520" stroke="#2496ED" stroke-width="1.4" stroke-linejoin="round"/>
      <circle cx="14" cy="4" r="1.2" fill="#2496ED"/>
    </g>

    <style>
      .cap{font:600 21px ui-monospace,Consolas,monospace;fill:#F1EDFB;letter-spacing:5px}
      .slate{font:600 11px ui-monospace,Consolas,monospace;fill:#A29BC0;letter-spacing:4px}
      .glbl{font:600 11px ui-monospace,Consolas,monospace;fill:#7FD8B0;letter-spacing:3px}
      .aulbl{font:600 11px ui-monospace,Consolas,monospace;fill:#E8C56A;letter-spacing:3px}
      .nlbl{font:600 10px ui-monospace,Consolas,monospace;fill:#6E6890;letter-spacing:2px}
      .kNum{font:800 30px 'Segoe UI',Helvetica,Arial,sans-serif;fill:#EDE9F7}
      .kSub{font:600 10px ui-monospace,Consolas,monospace;fill:#5D5878;letter-spacing:2px}

      @keyframes worldBreathe{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
      .world{transform-origin:960px 400px;animation:worldBreathe 16s ease-in-out infinite}

      /* containers ride the pipeline -->  */
      @keyframes slide{0%{transform:translateX(0);opacity:0}8%{opacity:1}82%{opacity:1}90%,100%{transform:translateX(400px);opacity:0}}
      .slide{animation:slide 3.6s cubic-bezier(0.35,0.1,0.6,0.9) infinite}
      .s0{animation-delay:0s}.s1{animation-delay:-1.2s}.s2{animation-delay:-2.4s}
      @keyframes stamp{0%,84%{transform:scale(0.3);opacity:0}86%{opacity:0.95}98%{transform:scale(2);opacity:0}100%{transform:scale(0.3);opacity:0}}
      .stamp{animation:stamp 3.6s ease-out infinite}

      @keyframes ledB{0%,100%{opacity:0.2}50%{opacity:1}}
      .led1{animation:ledB 1.3s ease-in-out infinite}
      .led2{animation:ledB 1.7s ease-in-out infinite -0.5s}
      .led3{animation:ledB 2.1s ease-in-out infinite -1.1s}
      @keyframes mastB{0%,100%{transform:scale(1);opacity:0.75}50%{transform:scale(1.18);opacity:1}}
      .mast{transform-origin:620px 150px;animation:mastB 2.6s ease-in-out infinite}

      @keyframes ecg{to{stroke-dashoffset:-1520}}
      .ecg{stroke-dasharray:90 1430;animation:ecg 5.5s linear infinite}

      @keyframes crawl{to{stroke-dashoffset:-64}}
      .up{stroke-dasharray:3 8;animation:crawl 1.4s linear infinite}

      @keyframes tw{0%,100%{opacity:0.14}50%{opacity:0.6}}
      .tw1{animation:tw 3.6s ease-in-out infinite}
      .tw2{animation:tw 4.9s ease-in-out infinite 1.1s}
      .tw3{animation:tw 6.1s ease-in-out infinite 2.3s}
      @keyframes fogDrift{0%,100%{transform:translate(0,0)}50%{transform:translate(58px,-24px)}}
      .fogDrift{animation:fogDrift 24s ease-in-out infinite}
      @keyframes fogDrift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-56px,26px)}}
      .fogDrift2{animation:fogDrift2 28s ease-in-out infinite}
      @keyframes fgSweep{0%{transform:translate(-420px,-260px);opacity:0}18%{opacity:0.16}55%{opacity:0.16}100%{transform:translate(760px,470px);opacity:0}}
      .fgSweep{animation:fgSweep 9.5s cubic-bezier(0.3,0.1,0.6,0.9) infinite}

      @keyframes cap{0%,20%{opacity:0}27%,58%{opacity:1}66%,100%{opacity:0}}
      .capA{animation:cap 16s linear infinite}
    </style>
  </defs>

  <!-- ============ STAGE ============ -->
  <rect width="1920" height="800" fill="#050505"/>
  <g class="fogDrift"><ellipse cx="620" cy="360" rx="760" ry="360" fill="url(#fogGreen)"/></g>
  <g class="fogDrift2"><ellipse cx="1480" cy="420" rx="720" ry="360" fill="url(#fogGold)"/></g>

  <g class="world">
    <!-- ambient stars -->
    <g fill="#6E67A0">
      <circle class="tw1" cx="180" cy="140" r="1.5"/><circle class="tw2" cx="1120" cy="90" r="1.4"/>
      <circle class="tw3" cx="1840" cy="200" r="1.5"/><circle class="tw1" cx="120" cy="460" r="1.4"/>
      <circle class="tw2" cx="1880" cy="640" r="1.4"/>
    </g>

    <!-- ============ THE ENGINE · FastAPI tower ============ -->
    <rect x="560" y="180" width="120" height="380" rx="14" fill="#07090C" stroke="#1E4034" stroke-width="2"/>
    <path d="M580 240 h80 M580 300 h80 M580 360 h80 M580 420 h80 M580 480 h80" stroke="#132A22" stroke-width="2"/>
    <circle class="led1" cx="588" cy="212" r="3" fill="#34D399"/>
    <circle class="led2" cx="604" cy="212" r="3" fill="#34D399"/>
    <circle class="led3" cx="620" cy="212" r="3" fill="#FBBF24"/>
    <text x="620" y="588" text-anchor="middle" class="glbl">FASTAPI</text>

    <!-- health mast -->
    <line x1="620" y1="180" x2="620" y2="152" stroke="#1E4034" stroke-width="2"/>
    <circle cx="620" cy="150" r="34" fill="url(#mastGlow)" class="mast"/>
    <circle cx="620" cy="150" r="5" fill="#D9FBE9"/>
    <circle cx="620" cy="150" r="6" fill="none" stroke="#6EE7B7"><animate attributeName="r" values="6;26;6" dur="2.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0;0.8" dur="2.6s" repeatCount="indefinite"/></circle>
    <text x="672" y="146" class="glbl">HEALTH · OK</text>

    <!-- ============ CI/CD conveyor · containers deploy ============ -->
    <line x1="120" y1="600" x2="556" y2="600" stroke="#1A1524" stroke-width="2"/>
    <g transform="translate(140,600)"><g class="slide s0"><use href="#docker" y="-16"/></g></g>
    <g transform="translate(140,600)"><g class="slide s1"><use href="#docker" y="-16"/></g></g>
    <g transform="translate(140,600)"><g class="slide s2"><use href="#docker" y="-16"/></g></g>
    <g transform="translate(556,600)">
      <path class="stamp s0" d="M-6 0 L-2 5 L7 -6" stroke="#34D399" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path class="stamp s1" d="M-6 0 L-2 5 L7 -6" stroke="#34D399" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path class="stamp s2" d="M-6 0 L-2 5 L7 -6" stroke="#34D399" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </g>
    <text x="120" y="644" class="nlbl">CI / CD · DOCKER · DEPLOY</text>

    <!-- ============ CLOUD ============ -->
    <path d="M 866 178 a20 20 0 0 1 10 -38 a26 26 0 0 1 50 -10 a18 18 0 0 1 26 16 a15 15 0 0 1 -7 32 Z" stroke="#3A3352" stroke-width="2" fill="#08070E"/>
    <text x="946" y="128" class="nlbl" fill="#8F87AC">CLOUD</text>
    <path class="up" d="M652 168 C 740 150 790 160 858 158" stroke="#2E5D4C" stroke-width="1.5"/>
    <circle r="3" fill="#6EE7B7"><animateMotion dur="2.2s" repeatCount="indefinite" path="M652 168 C 740 150 790 160 858 158"/><animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.12;0.85;1" dur="2.2s" repeatCount="indefinite"/></circle>

    <!-- ============ HEARTBEAT · the system lives ============ -->
    <path d="M120 706 H420 l18 -28 22 52 18 -24 H900 l18 -28 22 52 18 -24 H1420 l18 -28 22 52 18 -24 H1800" stroke="#123B2C" stroke-width="2" fill="none"/>
    <path class="ecg" d="M120 706 H420 l18 -28 22 52 18 -24 H900 l18 -28 22 52 18 -24 H1420 l18 -28 22 52 18 -24 H1800" stroke="#34D399" stroke-width="2" fill="none"/>

    <!-- ============ BUSINESS · gold ============ -->
    <text x="1150" y="188" class="aulbl">REVENUE ↗</text>
    <g transform="translate(1150,300)">
      <polyline points="0,120 60,100 120,110 180,70 240,84 300,40 360,55 420,20 480,30 540,0"
                stroke="#FBBF24" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"
                stroke-dasharray="620" stroke-dashoffset="620">
        <animate attributeName="stroke-dashoffset" values="620;0;0" keyTimes="0;0.55;1" dur="8s" repeatCount="indefinite"/>
      </polyline>
      <circle cx="540" cy="0" r="4.5" fill="#FDE68A"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.53;0.58;1" dur="8s" repeatCount="indefinite"/></circle>
    </g>

    <g transform="translate(1150,470)">
      <text class="kSub">UPTIME</text>
      <text y="40" class="kNum" fill="#6EE7B7">99.9%</text>
    </g>
    <g transform="translate(1390,470)">
      <text class="kSub">P95 LATENCY</text>
      <text y="40" class="kNum">184ms</text>
    </g>
    <g transform="translate(1630,470)">
      <text class="kSub" fill="#B08A2E">HOURS SAVED</text>
      <g>
        <text y="40" class="kNum" fill="#FBBF24" opacity="0"><animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.32;0.34;1" dur="4.5s" repeatCount="indefinite"/>1,842</text>
        <text y="40" class="kNum" fill="#FBBF24" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.32;0.34;0.66;0.68;1" dur="4.5s" repeatCount="indefinite"/>1,851</text>
        <text y="40" class="kNum" fill="#FBBF24" opacity="0"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.66;0.68;1" dur="4.5s" repeatCount="indefinite"/>1,860</text>
      </g>
    </g>
  </g>

  <!-- foreground defocus pass -->
  <g class="fgSweep" filter="url(#blurFg)"><line x1="300" y1="100" x2="520" y2="330" stroke="#2E7A5C" stroke-width="26" stroke-linecap="round" opacity="0.5"/></g>

  <rect width="1920" height="800" fill="url(#vig)"/>
  <rect width="1920" height="800" filter="url(#grain)" opacity="0.5"/>

  <!-- ============ TITLES · above the grade ============ -->
  <text x="960" y="756" text-anchor="middle" class="cap capA">it ships. it scales. it pays.</text>
  <text x="66" y="66" class="slate" opacity="0.9">CH 07 · PRODUCTION</text>
</svg>
