<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 195" width="480" height="195" fill="none" role="img" aria-label="GitHub stats for rehaannazir">
  <defs>
    <style>
      .ttl{font:700 13px 'Segoe UI',Helvetica,Arial,sans-serif;fill:#EDEDF2;letter-spacing:2px}
      .sub{font:500 10px ui-monospace,Consolas,monospace;fill:#5A5468}
      .num{font:800 26px 'Segoe UI',Helvetica,Arial,sans-serif;fill:#E9D5FF}
      .lab{font:600 10px ui-monospace,Consolas,monospace;fill:#8A8698;letter-spacing:1px}
      .tile{fill:#050507;stroke:#201A29}
      @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
      .live{animation:pulse 1.8s ease-in-out infinite}
      @keyframes grow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
      .bar{transform-origin:bottom;animation:grow .8s ease-out forwards}
    </style>
  </defs>
  <rect x="1" y="1" width="478" height="193" rx="14" fill="#000000" stroke="#17141C"/>

  <circle class="live" cx="22" cy="24" r="3" fill="#A855F7"/>
  <text x="32" y="28" class="ttl">GITHUB STATS</text>
  <text x="458" y="28" text-anchor="end" class="sub">@rehaannazir</text>
  <line x1="20" y1="38" x2="460" y2="38" stroke="#17141C"/>

  <!-- 4 tiles -->
  <g>
    <rect x="20" y="52" width="103" height="62" rx="10" class="tile"/>
    <text x="34" y="86" class="num">18</text>
    <text x="34" y="102" class="lab">REPOSITORIES</text>
  </g>
  <g>
    <rect x="132" y="52" width="103" height="62" rx="10" class="tile"/>
    <text x="146" y="86" class="num">7</text>
    <text x="146" y="102" class="lab">FOLLOWERS</text>
  </g>
  <g>
    <rect x="244" y="52" width="103" height="62" rx="10" class="tile"/>
    <text x="258" y="86" class="num">2</text>
    <text x="258" y="102" class="lab">FOLLOWING</text>
  </g>
  <g>
    <rect x="356" y="52" width="104" height="62" rx="10" class="tile"/>
    <text x="370" y="86" class="num">1</text>
    <text x="370" y="102" class="lab">TOTAL STARS</text>
  </g>

  <!-- contribution strip -->
  <rect x="20" y="128" width="440" height="46" rx="10" fill="#0A0710" stroke="#241D2E"/>
  <text x="36" y="149" class="lab" fill="#B98BF0">CONTRIBUTIONS · LAST 12 MONTHS</text>
  <text x="36" y="167" class="num" font-size="20">98</text>

  <!-- purely decorative pulse — not a data plot -->
  <g fill="#A855F7">
    <circle class="live" cx="410" cy="151" r="3"/>
    <circle class="live" cx="425" cy="151" r="3" style="animation-delay:.3s"/>
    <circle class="live" cx="440" cy="151" r="3" style="animation-delay:.6s"/>
  </g>
</svg>
