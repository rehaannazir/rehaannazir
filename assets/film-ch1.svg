<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 800" width="1920" height="800" fill="none" role="img" aria-label="Chapter 1 — The Problem: every system begins with a request">
  <defs>
    <radialGradient id="vig" cx="0.5" cy="0.5" r="0.72">
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/><stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="fogA" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#4C3B7A" stop-opacity="0.055"/><stop offset="1" stop-color="#4C3B7A" stop-opacity="0"/></radialGradient>
    <radialGradient id="fogB" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#2E2A44" stop-opacity="0.07"/><stop offset="1" stop-color="#2E2A44" stop-opacity="0"/></radialGradient>
    <radialGradient id="pulseG" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#E9DFFF" stop-opacity="0.95"/><stop offset="0.28" stop-color="#8B5CF6" stop-opacity="0.5"/><stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="portalWash" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.5"/><stop offset="0.6" stop-color="#3B2A66" stop-opacity="0.25"/><stop offset="1" stop-color="#050505" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tailG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0"/><stop offset="1" stop-color="#8B5CF6" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="blurFar" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="3.4"/></filter>
    <filter id="blurMid" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="1.4"/></filter>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" result="n"/><feColorMatrix in="n" type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.032"/></feComponentTransfer></filter>

    <g id="env"><path d="M0 0 h150 v96 h-150 Z" stroke-width="3"/><path d="M0 2 l75 54 l75 -54" stroke-width="3"/></g>
    <g id="paper"><rect x="0" y="0" width="118" height="150" rx="7" stroke-width="3"/><path d="M20 38 h78 M20 66 h78 M20 94 h52" stroke-width="3"/></g>

    <style>
      .cap{font:500 15px ui-monospace,Consolas,monospace;fill:#8F87AC;letter-spacing:4px}
      .slate{font:600 11px ui-monospace,Consolas,monospace;fill:#5A5470;letter-spacing:4px}
      .ez{animation-timing-function:cubic-bezier(0.45,0.05,0.25,1)}

      /* ---------- master 13s timeline ---------- */
      @keyframes camFar{0%,35%{transform:translateX(0)}73%,100%{transform:translateX(-560px)}}
      @keyframes camMid{0%,35%{transform:translateX(0)}73%,100%{transform:translateX(-1300px)}}
      @keyframes camNear{0%,35%{transform:translateX(0)}73%,100%{transform:translateX(-1960px)}}
      .camFar{animation:camFar 13s cubic-bezier(0.45,0.05,0.25,1) infinite}
      .camMid{animation:camMid 13s cubic-bezier(0.45,0.05,0.25,1) infinite}
      .camNear{animation:camNear 13s cubic-bezier(0.45,0.05,0.25,1) infinite}

      @keyframes chaosFade{0%,30%{opacity:0}40%,68%{opacity:1}78%,100%{opacity:0}}
      .chaosFade{animation:chaosFade 13s linear infinite}

      @keyframes pulseLife{0%,7%{opacity:0}13%,90%{opacity:1}96%,100%{opacity:0}}
      .pulseLife{animation:pulseLife 13s linear infinite}
      @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
      .bob{animation:bob 3.2s ease-in-out infinite}
      @keyframes tail{0%,36%{opacity:0}42%,66%{opacity:1}73%,100%{opacity:0}}
      .tail{animation:tail 13s linear infinite}

      @keyframes cap1{0%,14%{opacity:0}20%,29%{opacity:0.8}35%,100%{opacity:0}}
      .cap1{animation:cap1 13s linear infinite}
      @keyframes cap2{0%,80%{opacity:0}85%,93%{opacity:0.8}97.5%,100%{opacity:0}}
      .cap2{animation:cap2 13s linear infinite}

      @keyframes ring1{0%,73%{stroke-dashoffset:566;opacity:0}74.5%{opacity:1}82%{stroke-dashoffset:0}94%{opacity:1;stroke-dashoffset:0}98%,100%{opacity:0;stroke-dashoffset:0}}
      .ring1{animation:ring1 13s cubic-bezier(0.45,0.05,0.25,1) infinite}
      @keyframes ring2{0%,78%{stroke-dashoffset:692;opacity:0}79.5%{opacity:0.7}86%{stroke-dashoffset:0}93%{opacity:0.7;stroke-dashoffset:0}97%,100%{opacity:0;stroke-dashoffset:0}}
      .ring2{animation:ring2 13s cubic-bezier(0.45,0.05,0.25,1) infinite}

      @keyframes bloomUp{0%,74%{opacity:0}88%{opacity:0.75}92%{opacity:0.9}98%,100%{opacity:0}}
      .bloomUp{animation:bloomUp 13s ease-in-out infinite}
      @keyframes portal{0%,90%{transform:scale(0.24);opacity:0}91.5%{opacity:1}99.6%{transform:scale(13);opacity:0}100%{transform:scale(0.24);opacity:0}}
      .portal{transform-origin:960px 400px;animation:portal 13s cubic-bezier(0.5,0,0.8,0.4) infinite}
      @keyframes wash{0%,92%{opacity:0}96.5%{opacity:0.85}100%{opacity:0}}
      .wash{animation:wash 13s ease-in-out infinite}

      @keyframes jit{0%,100%{transform:translate(0,0)}25%{transform:translate(1.6px,-1px)}50%{transform:translate(-1.2px,1.2px)}75%{transform:translate(1px,0.6px)}}
      .jit{animation:jit 0.55s linear infinite}
      @keyframes sway{0%,100%{transform:translateY(-34px) rotate(-2deg)}50%{transform:translateY(34px) rotate(2.5deg)}}
      .sway{animation:sway 7s ease-in-out infinite}
      @keyframes crawl{to{stroke-dashoffset:-140}}
      .crawl{stroke-dasharray:14 20;animation:crawl 7s linear infinite}
      @keyframes tw{0%,100%{opacity:0.14}50%{opacity:0.6}}
      .tw1{animation:tw 3.6s ease-in-out infinite}
      .tw2{animation:tw 4.9s ease-in-out infinite 1.1s}
      .tw3{animation:tw 6.1s ease-in-out infinite 2.3s}
      @keyframes fogDrift{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,-30px)}}
      .fogDrift{animation:fogDrift 21s ease-in-out infinite}
      @keyframes fogDrift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-70px,24px)}}
      .fogDrift2{animation:fogDrift2 26s ease-in-out infinite}
    </style>
  </defs>

  <!-- ============ STAGE ============ -->
  <rect width="1920" height="800" fill="#050505"/>
  <g class="fogDrift"><ellipse cx="480" cy="210" rx="740" ry="360" fill="url(#fogA)"/></g>
  <g class="fogDrift2"><ellipse cx="1500" cy="620" rx="820" ry="380" fill="url(#fogB)"/></g>

  <!-- ============ WORLD · FAR (0.3x) ============ -->
  <g class="camFar" filter="url(#blurFar)">
    <g fill="#6E67A0">
      <circle class="tw1" cx="240" cy="150" r="1.6"/><circle class="tw2" cx="820" cy="90" r="1.4"/>
      <circle class="tw3" cx="1460" cy="200" r="1.7"/><circle class="tw1" cx="2100" cy="120" r="1.5"/>
      <circle class="tw2" cx="2760" cy="180" r="1.6"/><circle class="tw3" cx="3320" cy="100" r="1.4"/>
      <circle class="tw2" cx="600" cy="660" r="1.5"/><circle class="tw1" cx="1900" cy="700" r="1.6"/>
      <circle class="tw3" cx="3000" cy="640" r="1.5"/>
    </g>
    <g class="chaosFade">
      <!-- the giant clock, spinning too fast -->
      <g transform="translate(2620,330)" stroke="#232330" opacity="0.55">
        <circle r="190" stroke-width="7"/>
        <path d="M0 0 L0 -150" stroke-width="8" stroke-linecap="round"><animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="2.4s" repeatCount="indefinite"/></path>
        <path d="M0 0 L0 -96" stroke-width="10" stroke-linecap="round"><animateTransform attributeName="transform" type="rotate" from="40" to="400" dur="19s" repeatCount="indefinite"/></path>
      </g>
      <g transform="translate(3260,480) scale(1.7)" stroke="#1E1E2A" opacity="0.5"><g class="sway"><use href="#env"/></g></g>
    </g>
  </g>

  <!-- ============ WORLD · MID (0.68x) ============ -->
  <g class="camMid" filter="url(#blurMid)">
    <g fill="#8C86B8">
      <circle class="tw2" cx="420" cy="300" r="1.8"/><circle class="tw3" cx="1240" cy="560" r="1.6"/>
      <circle class="tw1" cx="2050" cy="420" r="1.8"/><circle class="tw3" cx="2900" cy="300" r="1.6"/>
      <circle class="tw1" cx="3500" cy="560" r="1.7"/>
    </g>
    <g class="chaosFade" stroke="#26263200">
      <g transform="translate(1700,170) rotate(-8)" stroke="#262632" opacity="0.75"><g class="sway"><use href="#env"/></g></g>
      <g transform="translate(2280,560) rotate(5)" stroke="#262632" opacity="0.7"><g class="sway" style="animation-delay:-3s"><use href="#env"/></g></g>
      <g transform="translate(2020,360) rotate(12)" stroke="#282838" opacity="0.75"><g class="jit"><use href="#paper"/></g></g>
      <g transform="translate(2740,220) rotate(-14)" stroke="#282838" opacity="0.7"><g class="jit" style="animation-delay:-0.2s"><use href="#paper"/></g></g>
    </g>
  </g>

  <!-- ============ WORLD · NEAR (1x) ============ -->
  <g class="camNear">
    <g fill="#B0AAD6">
      <circle class="tw3" cx="700" cy="240" r="1.6"/><circle class="tw1" cx="1560" cy="640" r="1.5"/>
      <circle class="tw2" cx="2500" cy="160" r="1.7"/><circle class="tw1" cx="3400" cy="600" r="1.6"/>
    </g>
    <g class="chaosFade">
      <!-- the tangled thread of manual process -->
      <path class="crawl" d="M2080 620 C 2220 480 2320 700 2460 560 S 2680 380 2820 520 S 3060 700 3200 540 S 3420 400 3560 470" stroke="#20202C" stroke-width="3.5" opacity="0.8"/>
      <g transform="translate(2380,120) rotate(9) scale(1.25)" stroke="#2E2E3E" opacity="0.9"><g class="jit" style="animation-delay:-0.35s"><use href="#paper"/></g></g>
      <g transform="translate(3120,600) rotate(-7) scale(1.3)" stroke="#2E2E3E" opacity="0.85"><g class="jit" style="animation-delay:-0.1s"><use href="#paper"/></g></g>
      <g transform="translate(3480,180) rotate(6) scale(1.5)" stroke="#2A2A38" opacity="0.9"><g class="sway" style="animation-delay:-1.6s"><use href="#env"/></g></g>
    </g>
  </g>

  <!-- ============ THE SUBJECT · the request ============ -->
  <g class="pulseLife">
    <g class="bob">
      <g class="tail"><ellipse cx="830" cy="400" rx="120" ry="5" fill="url(#tailG)"/></g>
      <circle class="bloomUp" cx="960" cy="400" r="150" fill="url(#pulseG)"/>
      <circle cx="960" cy="400" r="60" fill="url(#pulseG)" opacity="0.85"/>
      <circle cx="960" cy="400" fill="#F4EEFF" r="7.5">
        <animate attributeName="r" values="7.5;9.6;8;9.2;7.5" keyTimes="0;0.12;0.2;0.32;1" dur="2.6s" repeatCount="indefinite"/>
      </circle>
      <!-- heartbeat ripples · lub-dub -->
      <circle cx="960" cy="400" r="12" stroke="#A78BFA" stroke-width="1.6">
        <animate attributeName="r" values="12;88" dur="2.6s" begin="1.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.75;0" dur="2.6s" begin="1.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="960" cy="400" r="10" stroke="#8B5CF6" stroke-width="1.2">
        <animate attributeName="r" values="10;64" dur="2.6s" begin="1.55s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0" dur="2.6s" begin="1.55s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- ============ THE DECISION ============ -->
  <circle class="ring1" cx="960" cy="400" r="90" stroke="#A78BFA" stroke-width="2" stroke-dasharray="566" stroke-linecap="round" transform="rotate(-90 960 400)"/>
  <circle class="ring2" cx="960" cy="400" r="110" stroke="#8B5CF6" stroke-width="1.2" stroke-dasharray="692" stroke-linecap="round" transform="rotate(90 960 400)"/>
  <g class="portal"><circle cx="960" cy="400" r="120" stroke="#C4B5FD" stroke-width="2.5"/></g>
  <rect class="wash" width="1920" height="800" fill="url(#portalWash)"/>

  <!-- ============ TITLES / CHROME ============ -->
  <text x="960" y="580" text-anchor="middle" class="cap cap1">every system begins with a request.</text>
  <text x="960" y="580" text-anchor="middle" class="cap cap2">the answer — build intelligence.</text>
  <text x="66" y="66" class="slate" opacity="0.6">CH 01 · THE PROBLEM</text>

  <rect width="1920" height="800" fill="url(#vig)"/>
  <rect width="1920" height="800" filter="url(#grain)" opacity="0.5"/>
</svg>
