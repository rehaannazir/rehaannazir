<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 150" width="900" height="150" fill="none" role="img" aria-label="Development workflow">
  <defs>
    <linearGradient id="wf" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5B3D82"/><stop offset="0.5" stop-color="#A855F7"/><stop offset="1" stop-color="#C084FC"/>
    </linearGradient>
    <style>
      .st{font:700 13px 'Segoe UI',Helvetica,Arial,sans-serif;fill:#EDEDF2}
      .n{font:700 12px ui-monospace,Consolas,monospace;fill:#C084FC}
      .cap{font:600 12px 'Segoe UI',Helvetica,Arial,sans-serif;fill:#5A5468;letter-spacing:3px}
      @keyframes glow{0%,100%{opacity:.5}50%{opacity:1}}
      .beam{animation:glow 3s ease-in-out infinite}
    </style>
  </defs>
  <rect x="1" y="1" width="898" height="148" rx="16" fill="#000000" stroke="#17141C"/>
  <rect x="60" y="72" width="780" height="3" rx="1.5" fill="#1A1520"/>
  <rect x="60" y="72" width="780" height="3" rx="1.5" fill="url(#wf)" class="beam"/>
  <circle r="4.5" fill="#E9D5FF"><animateMotion dur="4s" repeatCount="indefinite" path="M60,73.5 H840"/></circle>

  <g text-anchor="middle">
    <g><circle cx="80" cy="73.5" r="13" fill="#050507" stroke="#7C3AED" stroke-width="1.5"/><text x="80" y="78" class="n">1</text><text x="80" y="118" class="st">Idea</text></g>
    <g><circle cx="232" cy="73.5" r="13" fill="#050507" stroke="#7C3AED" stroke-width="1.5"/><text x="232" y="78" class="n">2</text><text x="232" y="118" class="st">Research</text></g>
    <g><circle cx="384" cy="73.5" r="13" fill="#050507" stroke="#7C3AED" stroke-width="1.5"/><text x="384" y="78" class="n">3</text><text x="384" y="118" class="st">Prototype</text></g>
    <g><circle cx="536" cy="73.5" r="13" fill="#050507" stroke="#7C3AED" stroke-width="1.5"/><text x="536" y="78" class="n">4</text><text x="536" y="118" class="st">Automation</text></g>
    <g><circle cx="688" cy="73.5" r="13" fill="#050507" stroke="#7C3AED" stroke-width="1.5"/><text x="688" y="78" class="n">5</text><text x="688" y="118" class="st">Deployment</text></g>
    <g><circle cx="840" cy="73.5" r="13" fill="#050507" stroke="#7C3AED" stroke-width="1.5"/><text x="840" y="78" class="n">6</text><text x="840" y="118" class="st">Iteration</text></g>
  </g>
  <text x="450" y="32" text-anchor="middle" class="cap">SHIP · MEASURE · IMPROVE</text>
</svg>
