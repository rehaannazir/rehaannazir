<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 150" width="900" height="150" fill="none" role="img" aria-label="Development workflow">
  <defs>
    <linearGradient id="wf" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5B8CFF"/><stop offset="0.5" stop-color="#B96BFF"/><stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <style>
      .st{font:700 13px 'Segoe UI',Helvetica,Arial,sans-serif;fill:#E6E6F0}
      .n{font:700 12px ui-monospace,Consolas,monospace;fill:#0A0A0F}
      @keyframes glow{0%,100%{opacity:.4}50%{opacity:1}}
      .beam{animation:glow 3s ease-in-out infinite}
    </style>
  </defs>
  <rect x="1" y="1" width="898" height="148" rx="16" fill="#0A0A0F" stroke="#1C1C28"/>

  <!-- track -->
  <rect x="60" y="72" width="780" height="4" rx="2" fill="#1E1E2A"/>
  <rect x="60" y="72" width="780" height="4" rx="2" fill="url(#wf)" class="beam"/>
  <!-- traveling pulse -->
  <circle r="5" fill="#fff"><animateMotion dur="4s" repeatCount="indefinite" path="M60,74 H840"/></circle>

  <g text-anchor="middle">
    <!-- 6 stages -->
    <g><circle cx="80" cy="74" r="14" fill="#101017" stroke="url(#wf)" stroke-width="2"/><text x="80" y="79" class="n" fill="#5B8CFF">1</text><text x="80" y="118" class="st">Idea</text></g>
    <g><circle cx="232" cy="74" r="14" fill="#101017" stroke="url(#wf)" stroke-width="2"/><text x="232" y="79" class="n" fill="#5B8CFF">2</text><text x="232" y="118" class="st">Research</text></g>
    <g><circle cx="384" cy="74" r="14" fill="#101017" stroke="url(#wf)" stroke-width="2"/><text x="384" y="79" class="n" fill="#8A6BFF">3</text><text x="384" y="118" class="st">Prototype</text></g>
    <g><circle cx="536" cy="74" r="14" fill="#101017" stroke="url(#wf)" stroke-width="2"/><text x="536" y="79" class="n" fill="#B96BFF">4</text><text x="536" y="118" class="st">Automation</text></g>
    <g><circle cx="688" cy="74" r="14" fill="#101017" stroke="url(#wf)" stroke-width="2"/><text x="688" y="79" class="n" fill="#22D3EE">5</text><text x="688" y="118" class="st">Deployment</text></g>
    <g><circle cx="840" cy="74" r="14" fill="#101017" stroke="url(#wf)" stroke-width="2"/><text x="840" y="79" class="n" fill="#22D3EE">6</text><text x="840" y="118" class="st">Iteration</text></g>
  </g>
  <text x="450" y="34" text-anchor="middle" class="st" fill="#7A7A94" font-size="12" letter-spacing="3">SHIP · MEASURE · IMPROVE</text>
</svg>
