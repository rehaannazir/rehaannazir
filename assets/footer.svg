<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 130" width="900" height="130" fill="none" role="img" aria-label="footer">
  <defs>
    <linearGradient id="fg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A855F7" stop-opacity="0"/><stop offset="0.5" stop-color="#A855F7"/><stop offset="1" stop-color="#A855F7" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="fgl" cx="0.5" cy="0" r="0.8">
      <stop offset="0" stop-color="#7C3AED" stop-opacity="0.22"/><stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <style>
      .q{font:600 18px 'Segoe UI',Helvetica,Arial,sans-serif;fill:#D8D2E2}
      .s{font:500 12px ui-monospace,Consolas,monospace;fill:#5A5468;letter-spacing:2px}
      @keyframes p{0%,100%{opacity:.4}50%{opacity:1}}
      .dot{animation:p 2s ease-in-out infinite}
    </style>
  </defs>
  <rect x="1" y="1" width="898" height="128" rx="16" fill="#000000" stroke="#17141C"/>
  <ellipse cx="450" cy="0" rx="400" ry="90" fill="url(#fgl)"/>
  <line x1="180" y1="40" x2="720" y2="40" stroke="url(#fg)" stroke-width="1.5"/>
  <text x="450" y="70" text-anchor="middle" class="q">“Data is the truth. AI is the intelligence.”</text>
  <text x="450" y="102" text-anchor="middle" class="s">BUILDING NYVEXA — PAKISTAN'S LARGEST AI COMPANY</text>
  <circle class="dot" cx="352" cy="98" r="2" fill="#A855F7"/>
  <circle class="dot" cx="548" cy="98" r="2" fill="#A855F7"/>
</svg>
